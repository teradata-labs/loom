# === METADATA START ===
name: moving_average
title: "Moving Average"
description: |
  Calculate moving averages to smooth time series data and identify trends. Moving averages
  reduce noise by averaging values over a sliding window, making it easier to spot patterns
  and trends in temporal data.

  Moving averages are essential for:
  - Trend identification
  - Noise reduction in time series
  - Forecasting baselines
  - Anomaly detection
  - Seasonal pattern analysis

  Teradata provides both SQL window functions for basic moving averages and UAF functions
  for advanced smoothing and forecasting:
  - TD_SMOOTHMA: Cumulative, mean, median, and exponential smoothing with window presets
  - TD_MAMEAN: Flat forecaster using moving average, mean, or naive (random walk) algorithm
  - TD_SIMPLEEXP: Single exponential smoothing (level only, no trend or seasonality)

category: timeseries
difficulty: beginner
teradata_function: MovingAverage, TD_SMOOTHMA, TD_MAMEAN, TD_SIMPLEEXP
# === METADATA END ===

# === USE_CASES START ===
intents:
  - analytics
  - forecasting
  - query_generation
use_cases:
  - Stock price trend analysis
  - Sales forecasting and smoothing
  - Website traffic trend identification
  - Temperature and weather pattern analysis
  - Network performance monitoring
  - Customer metrics trending (active users, revenue)
  - Signal smoothing before ARIMA modeling (TD_SMOOTHMA)
  - Short-horizon flat forecasting for stationary series (TD_MAMEAN)
  - Level-only exponential smoothing (TD_SIMPLEEXP)
# === USE_CASES END ===

# === PARAMETERS START ===
parameters:
  # --- Parameter 1: Database ---
  - name: database
    type: string
    # LLM-HINT: Maps to {{database}} in all SQL templates below
    required: true
    description: "Database containing time series data"
    example: "sales_analytics"

  # --- Parameter 2: Table ---
  - name: table
    type: string
    # LLM-HINT: Maps to {{table}} in all SQL templates below
    required: true
    description: "Table with temporal data"
    example: "daily_sales"

  # --- Parameter 3: Value Column ---
  - name: value_column
    type: string
    # LLM-HINT: Numeric column to smooth using moving average (revenue, price, count, etc.)
    required: true
    description: "Numeric column to calculate moving average on"
    example: "revenue"

  # --- Parameter 4: Time Column ---
  - name: time_column
    type: string
    # LLM-HINT: DATE or TIMESTAMP column for chronological ordering (critical for window calculation)
    required: true
    description: "Timestamp or date column for ordering"
    example: "sale_date"

  # --- Parameter 5: Window Size ---
  - name: window_size
    type: integer
    # LLM-HINT: Number of rows to include in average (7=weekly, 30=monthly, 90=quarterly)
    required: true
    description: "Number of periods to average over (e.g., 7 for weekly, 30 for monthly)"
    example: "7"

  # --- Parameter 6: Partition Column ---
  - name: partition_column
    type: string
    # LLM-HINT: Optional grouping column for separate MAs per category (store_id, product_id, region)
    required: false
    description: "Optional: partition by this column for separate moving averages"
    example: "store_id"

  # --- Parameter 7: Series ID ---
  - name: series_id
    type: string
    # LLM-HINT: Column identifying each series instance for UAF functions (TD_SMOOTHMA, TD_MAMEAN, TD_SIMPLEEXP)
    required: false
    description: "Column identifying each series instance (for UAF functions)"
    example: "store_id"

  # --- Parameter 8: Sequence Column ---
  - name: seq_column
    type: string
    # LLM-HINT: Integer sequence column for UAF SERIES_SPEC ROW_AXIS(SEQUENCE(...))
    required: false
    description: "Integer sequence column for UAF functions"
    example: "seq_no"

  # --- Parameter 9: Forecast Periods ---
  - name: forecast_periods
    type: integer
    # LLM-HINT: Number of future periods to forecast (for TD_MAMEAN and TD_SIMPLEEXP)
    required: false
    description: "Number of future periods to forecast (1-32000, for TD_MAMEAN and TD_SIMPLEEXP)"
    example: "8"

  # --- Parameter 10: Alpha ---
  - name: alpha
    type: number
    # LLM-HINT: Smoothing factor for TD_SIMPLEEXP and TD_SMOOTHMA exponential mode (0-1)
    required: false
    description: "Smoothing factor (0-1). Higher values weight recent observations more heavily."
    example: "0.3"
# === PARAMETERS END ===

# === TEMPLATES START ===
templates:
  # === SIMPLE_MOVING_AVERAGE TEMPLATE ===
  # LLM-HINT: Use this for basic trend smoothing with equal weighting of all values in window
  simple_moving_average:
    description: "Basic moving average calculation"
    sql: |
      -- Calculate simple moving average (SMA)
      -- NOTE: To partition by a column (e.g., per store), uncomment the PARTITION BY line and add partition_column to ORDER BY
      SELECT
        {{time_column}},
        {{value_column}} as actual_value,
        AVG({{value_column}}) OVER (
          -- PARTITION BY {{partition_column}}  -- Uncomment for separate moving averages per group
          ORDER BY {{time_column}}
          ROWS BETWEEN {{window_size_minus_1}} PRECEDING AND CURRENT ROW
        ) as moving_avg_{{window_size}}
      FROM {{database}}.{{table}}
      ORDER BY {{time_column}};  -- Add {{partition_column}}, before {{time_column}} if partitioning
    required_parameters:
      - database
      - table
      - value_column
      - time_column
      - window_size

  # === MULTIPLE_WINDOWS TEMPLATE ===
  # LLM-HINT: Compare short-term vs long-term trends using multiple window sizes (7/30/90 days)
  multiple_windows:
    description: "Calculate multiple moving averages with different window sizes"
    sql: |
      -- Compare short-term vs long-term trends
      -- NOTE: To partition by a column, uncomment all PARTITION BY lines and add partition_column to ORDER BY
      SELECT
        {{time_column}},
        {{value_column}} as actual_value,
        -- Short-term MA (e.g., 7 days)
        AVG({{value_column}}) OVER (
          -- PARTITION BY {{partition_column}}  -- Uncomment for separate MAs per group
          ORDER BY {{time_column}}
          ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
        ) as ma_7,
        -- Medium-term MA (e.g., 30 days)
        AVG({{value_column}}) OVER (
          -- PARTITION BY {{partition_column}}  -- Uncomment for separate MAs per group
          ORDER BY {{time_column}}
          ROWS BETWEEN 29 PRECEDING AND CURRENT ROW
        ) as ma_30,
        -- Long-term MA (e.g., 90 days)
        AVG({{value_column}}) OVER (
          -- PARTITION BY {{partition_column}}  -- Uncomment for separate MAs per group
          ORDER BY {{time_column}}
          ROWS BETWEEN 89 PRECEDING AND CURRENT ROW
        ) as ma_90
      FROM {{database}}.{{table}}
      ORDER BY {{time_column}};  -- Add {{partition_column}}, before {{time_column}} if partitioning
    required_parameters:
      - database
      - table
      - value_column
      - time_column

  # === EXPONENTIAL_MOVING_AVERAGE TEMPLATE ===
  # LLM-HINT: More responsive than SMA; weights recent values higher using alpha = 2/(N+1)
  exponential_moving_average:
    description: "Exponential moving average (EMA) - gives more weight to recent values"
    sql: |
      -- Exponential moving average with smoothing factor
      -- Alpha = 2 / (window_size + 1)
      WITH RECURSIVE ema AS (
        -- Initialize: first value = first actual value
        SELECT
          {{time_column}},
          {{value_column}},
          CAST({{value_column}} AS DECIMAL(18,2)) as ema_value,
          ROW_NUMBER() OVER (ORDER BY {{time_column}}) as rn
        FROM {{database}}.{{table}}
        WHERE {{time_column}} = (SELECT MIN({{time_column}}) FROM {{database}}.{{table}})

        UNION ALL

        -- Recursive: EMA = alpha * current_value + (1 - alpha) * previous_ema
        SELECT
          curr.{{time_column}},
          curr.{{value_column}},
          CAST((2.0 / ({{window_size}} + 1)) * curr.{{value_column}} +
               (1 - (2.0 / ({{window_size}} + 1))) * prev.ema_value AS DECIMAL(18,2)),
          prev.rn + 1
        FROM {{database}}.{{table}} curr
        JOIN ema prev ON curr.{{time_column}} > prev.{{time_column}}
        WHERE curr.rn = prev.rn + 1
      )
      SELECT
        {{time_column}},
        {{value_column}} as actual_value,
        ema_value as exponential_ma
      FROM ema
      ORDER BY {{time_column}};
    required_parameters:
      - database
      - table
      - value_column
      - time_column
      - window_size

  # === TREND_DETECTION TEMPLATE ===
  # LLM-HINT: Identifies trend reversals via MA crossovers (golden cross = bullish, death cross = bearish)
  trend_detection:
    description: "Detect trend changes using moving average crossovers"
    sql: |
      -- Golden cross (short MA crosses above long MA) = bullish signal
      -- Death cross (short MA crosses below long MA) = bearish signal
      WITH ma_values AS (
        SELECT
          {{time_column}},
          {{value_column}},
          AVG({{value_column}}) OVER (
            ORDER BY {{time_column}}
            ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
          ) as ma_short,
          AVG({{value_column}}) OVER (
            ORDER BY {{time_column}}
            ROWS BETWEEN 29 PRECEDING AND CURRENT ROW
          ) as ma_long,
          LAG(AVG({{value_column}}) OVER (
            ORDER BY {{time_column}}
            ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
          )) OVER (ORDER BY {{time_column}}) as prev_ma_short,
          LAG(AVG({{value_column}}) OVER (
            ORDER BY {{time_column}}
            ROWS BETWEEN 29 PRECEDING AND CURRENT ROW
          )) OVER (ORDER BY {{time_column}}) as prev_ma_long
        FROM {{database}}.{{table}}
      )
      SELECT
        {{time_column}},
        {{value_column}},
        ma_short,
        ma_long,
        CASE
          WHEN ma_short > ma_long AND prev_ma_short <= prev_ma_long THEN 'Golden Cross (Bullish)'
          WHEN ma_short < ma_long AND prev_ma_short >= prev_ma_long THEN 'Death Cross (Bearish)'
          WHEN ma_short > ma_long THEN 'Uptrend'
          WHEN ma_short < ma_long THEN 'Downtrend'
          ELSE 'Neutral'
        END as signal
      FROM ma_values
      WHERE prev_ma_short IS NOT NULL
      ORDER BY {{time_column}};
    required_parameters:
      - database
      - table
      - value_column
      - time_column

  # === UAF_SMOOTHMA TEMPLATE ===
  # LLM-HINT: TD_SMOOTHMA for advanced smoothing with MEAN, MEDIAN, CUMULATIVE, EXPONENTIAL modes and well-known presets
  uaf_smoothma:
    description: "TD_SMOOTHMA: UAF-based moving average smoothing with multiple algorithms and well-known presets"
    sql: |
      -- TD_SMOOTHMA: Advanced moving average smoothing using UAF.
      -- Algorithms: CUMULATIVE, MEAN, MEDIAN, EXPONENTIAL
      -- Produces single-layer ART (ARTPRIMARY only).
      -- Output column: MAGNITUDE_<field> (smoothed values)

      -- Simple mean MA with window
      EXECUTE FUNCTION INTO VOLATILE ART(smoothma_art)
      TD_SMOOTHMA(
          SERIES_SPEC(
              TABLE_NAME({{table}}),
              SERIES_ID({{series_id}}),
              ROW_AXIS(SEQUENCE({{seq_column}})),
              PAYLOAD(FIELDS({{value_column}}), CONTENT(REAL))
          ),
          FUNC_PARAMS(
              WINDOW({{window_size}}),
              PAD(0),
              MA(MEAN)
          )
      );

      SELECT * FROM smoothma_art;

      -- Alternative: Use a well-known weighted MA preset
      -- Presets: 3MA, 5MA, 2x12MA, 3x3MA, 3x5MA, S15MA, S21MA,
      --          H5MA, H9MA, H13MA, H23MA
      -- EXECUTE FUNCTION INTO VOLATILE ART(wellknown_art)
      -- TD_SMOOTHMA(
      --     SERIES_SPEC(...),
      --     FUNC_PARAMS(WINDOW(5), PAD(0), MA(MEAN), WELL_KNOWN("5MA"))
      -- );
    required_parameters:
      - table
      - series_id
      - seq_column
      - value_column
      - window_size

  # === UAF_SMOOTHMA_EXPONENTIAL TEMPLATE ===
  # LLM-HINT: TD_SMOOTHMA with EXPONENTIAL mode for weighted smoothing via LAMBDA parameter
  uaf_smoothma_exponential:
    description: "TD_SMOOTHMA: Exponential moving average smoothing using UAF"
    sql: |
      -- TD_SMOOTHMA with EXPONENTIAL algorithm.
      -- LAMBDA controls the decay factor (0-1): higher = discount older values faster.
      -- No WINDOW parameter needed for EXPONENTIAL mode.
      EXECUTE FUNCTION INTO VOLATILE ART(exp_smooth_art)
      TD_SMOOTHMA(
          SERIES_SPEC(
              TABLE_NAME({{table}}),
              SERIES_ID({{series_id}}),
              ROW_AXIS(SEQUENCE({{seq_column}})),
              PAYLOAD(FIELDS({{value_column}}), CONTENT(REAL))
          ),
          FUNC_PARAMS(
              MA(EXPONENTIAL),
              LAMBDA({{alpha}})
          )
      );

      -- Output: MAGNITUDE_<field> (exponentially smoothed values)
      SELECT * FROM exp_smooth_art;
    required_parameters:
      - table
      - series_id
      - seq_column
      - value_column
      - alpha

  # === UAF_MAMEAN_FORECAST TEMPLATE ===
  # LLM-HINT: TD_MAMEAN flat forecaster; all forecast periods receive the same value; three-layer ART
  uaf_mamean_forecast:
    description: "TD_MAMEAN: Moving average flat forecaster (MA, MEAN, or NAIVE algorithm)"
    sql: |
      -- TD_MAMEAN: Flat forecaster using moving average, mean, or naive algorithm.
      -- All forecast periods beyond the last observation receive the same forecast value.
      -- Suitable for short-horizon forecasts of stationary series with no trend or seasonality.
      --
      -- Algorithms:
      --   MA: Moving average of last K_ORDER observations
      --   MEAN: Overall mean of entire series
      --   NAIVE: Random walk (last observed value = forecast)
      --
      -- Produces three-layer ART: ARTPRIMARY, ARTFITMETADATA, ARTFITRESIDUALS
      EXECUTE FUNCTION INTO VOLATILE ART(mamean_art)
      TD_MAMEAN(
          SERIES_SPEC(
              TABLE_NAME({{table}}),
              SERIES_ID({{series_id}}),
              ROW_AXIS(SEQUENCE({{seq_column}})),
              PAYLOAD(FIELDS({{value_column}}), CONTENT(REAL))
          ),
          FUNC_PARAMS(
              FORECAST_PERIODS({{forecast_periods}}),
              ALGORITHM(MA),
              K_ORDER({{window_size}}),
              PREDICTION_INTERVALS(BOTH),
              FIT_METRICS(1),
              RESIDUALS(1)
          )
      );

      -- Primary: OBSERVED_VALUE, FORECAST_VALUE, LO_80, HI_80, LO_95, HI_95
      SELECT * FROM mamean_art;

      -- Fit metrics: R_SQUARE, MAE, MSE, MAPE, FSTAT_CALC, etc.
      EXECUTE FUNCTION TD_EXTRACT_RESULTS(
          ART_SPEC(TABLE_NAME(mamean_art), LAYER(ARTFITMETADATA))
      );

      -- Residuals: ACTUAL_VALUE, CALC_VALUE, RESIDUAL
      EXECUTE FUNCTION TD_EXTRACT_RESULTS(
          ART_SPEC(TABLE_NAME(mamean_art), LAYER(ARTFITRESIDUALS))
      );
    required_parameters:
      - table
      - series_id
      - seq_column
      - value_column
      - forecast_periods
      - window_size

  # === UAF_SIMPLEEXP_FORECAST TEMPLATE ===
  # LLM-HINT: TD_SIMPLEEXP single exponential smoothing; level only, no trend or seasonality; flat forecast
  uaf_simpleexp_forecast:
    description: "TD_SIMPLEEXP: Single exponential smoothing forecast (level only, flat forecast)"
    sql: |
      -- TD_SIMPLEEXP: Simple (single) exponential smoothing.
      -- Models level only; no trend or seasonality.
      -- ALPHA controls smoothing: higher = weight recent observations more.
      -- ALPHA(1.0) = no smoothing (each forecast = prior observation).
      -- All forecast periods receive the same value (flat forecaster).
      -- Use TD_HOLT_WINTERS_FORECASTER when trend or seasonality is present.
      --
      -- Produces three-layer ART: ARTPRIMARY, ARTFITMETADATA, ARTFITRESIDUALS
      EXECUTE FUNCTION INTO VOLATILE ART(simpleexp_art)
      TD_SIMPLEEXP(
          SERIES_SPEC(
              TABLE_NAME({{table}}),
              SERIES_ID({{series_id}}),
              ROW_AXIS(SEQUENCE({{seq_column}})),
              PAYLOAD(FIELDS({{value_column}}), CONTENT(REAL))
          ),
          FUNC_PARAMS(
              FORECAST_PERIODS({{forecast_periods}}),
              FORECAST_STARTING_VALUE('MEAN'),
              ALPHA({{alpha}}),
              PREDICTION_INTERVALS(BOTH),
              FIT_METRICS(1),
              RESIDUALS(1)
          ),
          OUTPUT_FMT(INDEX_STYLE(FLOW_THROUGH))
      );

      -- Primary: OBSERVED_VALUE, FORECAST_VALUE, LO_80, HI_80, LO_95, HI_95
      SELECT * FROM simpleexp_art;

      -- Fit metrics
      EXECUTE FUNCTION TD_EXTRACT_RESULTS(
          ART_SPEC(TABLE_NAME(simpleexp_art), LAYER(ARTFITMETADATA))
      );
    required_parameters:
      - table
      - series_id
      - seq_column
      - value_column
      - forecast_periods
      - alpha
# === TEMPLATES END ===

# === EXAMPLES START ===
examples:
  # --- Example 1: Daily Sales Smoothing ---
  - name: "Daily Sales Smoothing"
    description: "Smooth daily sales data to identify weekly trends"
    parameters:
      database: "retail"
      table: "daily_sales"
      value_column: "total_sales"
      time_column: "sale_date"
      window_size: 7
    expected_result: |
      Raw daily sales are noisy (weekend spikes, weekday dips).
      7-day moving average shows overall trend:
      - Week 1: MA = $45,000 (baseline)
      - Week 2: MA = $47,500 (growing)
      - Week 3: MA = $46,000 (slight decline)

      Helps identify genuine trends vs random fluctuation.

  # --- Example 2: Stock Price Analysis ---
  - name: "Stock Price Analysis"
    description: "Identify trend changes using 50-day and 200-day moving averages"
    parameters:
      database: "finance"
      table: "stock_prices"
      value_column: "close_price"
      time_column: "trade_date"
      window_size: 50
    expected_result: |
      Classic technical analysis signals:
      - When 50-day MA crosses above 200-day MA = Golden Cross (buy signal)
      - When 50-day MA crosses below 200-day MA = Death Cross (sell signal)

      Detected Golden Cross on March 15, 2024:
      - 50-day MA: $152
      - 200-day MA: $150
      - Signal: Uptrend beginning

  # --- Example 3: Website Traffic Monitoring ---
  - name: "Website Traffic Monitoring"
    description: "Track daily active users with 30-day moving average"
    parameters:
      database: "web_analytics"
      table: "daily_metrics"
      value_column: "daily_active_users"
      time_column: "metric_date"
      window_size: 30
      partition_column: "platform"
    expected_result: |
      Separate moving averages for web, mobile, tablet:
      - Web: MA trending up (+5% MoM)
      - Mobile: MA flat
      - Tablet: MA trending down (-3% MoM)

      Smoothed data removes weekend/weekday patterns, shows true trends.

  # --- Example 4: UAF TD_SMOOTHMA with Well-Known Preset ---
  - name: "UAF Smoothing with Well-Known Preset"
    description: "Use TD_SMOOTHMA with a well-known weighted moving average preset"
    parameters:
      table: "orders_ts"
      series_id: "order_id"
      seq_column: "seq"
      value_column: "qty"
      window_size: 5
    expected_result: |
      TD_SMOOTHMA with MA(MEAN) and WELL_KNOWN("5MA"):
      - Applies Henderson-weighted 5-point moving average
      - Output: MAGNITUDE_qty column with smoothed values
      - Single-layer ART (ARTPRIMARY only)

      Well-known presets use mathematically derived weight profiles
      that minimize noise while preserving the underlying trend.

  # --- Example 5: UAF TD_MAMEAN Flat Forecast ---
  - name: "UAF Moving Average Flat Forecast"
    description: "Use TD_MAMEAN for short-horizon flat forecasting"
    parameters:
      table: "orders_ts"
      series_id: "store_id"
      seq_column: "seq_no"
      value_column: "sales_amt"
      forecast_periods: 8
      window_size: 3
    expected_result: |
      TD_MAMEAN with ALGORITHM(MA) and K_ORDER(3):
      - In-sample: OBSERVED_VALUE + FORECAST_VALUE (fitted moving average)
      - Out-of-sample: 8 forecast periods all receive the same flat value
        (average of last 3 observations)
      - ARTFITMETADATA: R_SQUARE, MAE, MSE, MAPE
      - ARTFITRESIDUALS: ACTUAL_VALUE, CALC_VALUE, RESIDUAL

      Suitable for stationary series with no trend. Use ARIMA or
      Holt-Winters for series with trend or seasonality.

  # --- Example 6: UAF TD_SIMPLEEXP Single Exponential Smoothing ---
  - name: "UAF Simple Exponential Smoothing"
    description: "Use TD_SIMPLEEXP for level-only smoothing and flat forecast"
    parameters:
      table: "inflation_ts"
      series_id: "country_id"
      seq_column: "year_recorded"
      value_column: "inflation_rate"
      forecast_periods: 4
      alpha: 0.1
    expected_result: |
      TD_SIMPLEEXP with ALPHA(0.1):
      - Low alpha produces very smooth forecasts (slow to react to recent changes)
      - FORECAST_STARTING_VALUE('MEAN') uses series mean as initial value
      - All 4 forecast periods receive the same flat value
      - ARTFITMETADATA: R_SQUARE, MAE, MSE, MAPE for fit quality
      - OUTPUT_FMT(INDEX_STYLE(FLOW_THROUGH)): ROW_I inherits original index type
# === EXAMPLES END ===

# === COMMON_ERRORS START ===
common_errors:
  # --- Error 1: Insufficient Data ---
  - error: "Not enough data for window size"
    cause: "Less than window_size rows available (especially at start of series)"
    solution: "First few rows will have partial averages or NULLs. Either accept this or start analysis after window_size periods"

  # --- Error 2: Gaps in Time Series ---
  - error: "Gaps in time series"
    cause: "Missing dates (e.g., no sales on holidays)"
    solution: "Fill gaps with 0 or interpolated values before calculating MA. Use calendar table to ensure continuous dates"

  # --- Error 3: Incorrect Partitioning ---
  - error: "Wrong partition causing incorrect averages"
    cause: "Partition column has unexpected values or NULLs"
    solution: "Verify partition column is correct. Check for NULL values that might create separate partition"

  # --- Error 4: Lagging Indicator ---
  - error: "Moving average lags actual data"
    cause: "This is expected - MA is a lagging indicator"
    solution: "Use exponential MA for faster response, or reduce window size. MA always trails the actual data"

  # --- Error 5: TD_SMOOTHMA PAD Required with MEAN/MEDIAN ---
  - error: "PAD parameter required for TD_SMOOTHMA with MEAN or MEDIAN"
    cause: "MEAN and MEDIAN algorithms require PAD to fill positions before the window is full"
    solution: "Add PAD(value) to FUNC_PARAMS. Use PAD(0) for zero-fill, or the series mean for less edge distortion."

  # --- Error 6: TD_MAMEAN K_ORDER Required with MA ---
  - error: "K_ORDER required when ALGORITHM is MA"
    cause: "TD_MAMEAN with ALGORITHM(MA) requires K_ORDER to specify the window size"
    solution: "Add K_ORDER(n) to FUNC_PARAMS where n is the window size (1-32000). K_ORDER is ignored for MEAN and NAIVE algorithms."

  # --- Error 7: TD_SIMPLEEXP ALPHA Default is 1.0 ---
  - error: "TD_SIMPLEEXP producing no smoothing"
    cause: "Default ALPHA is 1.0, which means each forecast equals the prior observation (no smoothing)"
    solution: "Set ALPHA explicitly. Common values: 0.1 (very smooth), 0.3 (moderate), 0.5 (responsive). Lower alpha = smoother forecasts."
# === COMMON_ERRORS END ===

# === BEST_PRACTICES START ===
best_practices: |
  ## Moving Average Best Practices

  ### 1. Choosing Window Size
  **Common window sizes:**
  - 7 days = weekly patterns
  - 14 days = bi-weekly
  - 30 days = monthly trends
  - 90 days = quarterly trends
  - 365 days = yearly/seasonal

  **Guidelines:**
  - Larger window = smoother but more lagging
  - Smaller window = more responsive but noisier
  - Match window to your business cycle

  ### 2. Simple vs Exponential MA
  **Simple MA (SMA):**
  - All values in window weighted equally
  - Easier to understand and explain
  - Good for general trend identification

  **Exponential MA (EMA):**
  - Recent values weighted more heavily
  - More responsive to recent changes
  - Better for trading signals, anomaly detection

  ### 3. Handling Data Gaps
  **Fill missing dates:**
  ```sql
  -- Generate calendar table
  WITH calendar AS (
    SELECT date_column
    FROM sys_calendar.calendar
    WHERE date_column BETWEEN '2024-01-01' AND '2024-12-31'
  )
  SELECT
    c.date_column,
    COALESCE(s.sales, 0) as sales
  FROM calendar c
  LEFT JOIN sales_table s ON c.date_column = s.sale_date
  ```

  ### 4. Multiple Time Horizons
  **Use 2-3 different window sizes:**
  - Short-term (7 days): Immediate trends
  - Medium-term (30 days): Overall direction
  - Long-term (90 days): Seasonal patterns

  **Crossover strategy:**
  - When short MA crosses above long MA = uptrend starting
  - When short MA crosses below long MA = downtrend starting

  ### 5. Seasonal Adjustment
  **For seasonal data:**
  - Use year-over-year moving average
  - Or deseasonalize first, then apply MA
  - Example: Compare this week vs same week last year

  ### 6. Visualization
  **Plot together:**
  - Actual values (line chart)
  - Moving average (smoothed line)
  - Makes trends obvious visually

  **Bollinger Bands:**
  - MA +/- 2 standard deviations
  - Shows volatility and potential outliers

  ### 7. UAF Smoothing Functions

  **TD_SMOOTHMA for trend exposure:**
  - MA(MEAN): Simple moving average with configurable window
  - MA(MEDIAN): Robust to outliers (uses median instead of mean)
  - MA(CUMULATIVE): Running cumulative average
  - MA(EXPONENTIAL): Weighted by LAMBDA decay factor
  - WELL_KNOWN presets: 3MA, 5MA, 2x12MA, 3x3MA, 3x5MA, S15MA, S21MA, H5MA, H9MA, H13MA, H23MA
  - ONE_SIDED(1): Trailing window (no centering) for real-time smoothing

  **TD_MAMEAN for flat forecasting:**
  - ALGORITHM(MA): Forecast = average of last K_ORDER observations
  - ALGORITHM(MEAN): Forecast = overall series mean
  - ALGORITHM(NAIVE): Forecast = last observed value (random walk)
  - Suitable for stationary series with no trend or seasonality
  - All forecast periods receive the same flat value

  **TD_SIMPLEEXP for level smoothing:**
  - Single exponential smoothing (no trend, no seasonality)
  - ALPHA controls responsiveness: low = smooth, high = reactive
  - FORECAST_STARTING_VALUE: 'FIRST' (default) or 'MEAN'
  - Flat forecast like TD_MAMEAN but with exponential weighting
  - Upgrade to TD_HOLT_WINTERS_FORECASTER when trend/seasonality is present

  ### 8. Forecasting Hierarchy
  **Choose the right forecasting function:**
  - TD_MAMEAN / TD_SIMPLEEXP: Stationary, no trend, no seasonality (flat forecast)
  - TD_HOLT_WINTERS_FORECASTER: Trend and/or seasonality (triple exponential smoothing)
  - TD_ARIMAESTIMATE pipeline: Complex autocorrelation, rigorous model selection
  - TD_AUTOARIMA: Automatic model selection (exploration phase)

  ### 9. Performance Optimization
  **For large datasets:**
  - Partition by logical groups (store, product, region)
  - Use indexed time column
  - Consider pre-aggregating to daily/weekly before MA

  **Incremental updates:**
  - For real-time dashboards, only calculate MA for new periods
  - Store historical MA values
