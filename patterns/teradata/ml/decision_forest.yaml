# === METADATA START ===
name: decision_forest
title: "Decision Forest (Random Forest)"
description: |
  Train and score random decision forest ensembles using TD_DecisionForest and
  TD_DecisionForestPredict. Builds multiple decision trees in parallel across AMPs
  using bagging (bootstrap aggregating). Supports binary classification, multiclass
  classification (up to 500 classes), and regression.

  Decision Forest is suitable for:
  - Classification with many features
  - Regression with nonlinear relationships
  - Feature importance estimation (via tree splits)
  - Handling high-dimensional data without feature selection
  - Cases where model interpretability at the tree level is valuable

category: ml
difficulty: intermediate
teradata_function: TD_DecisionForest
# === METADATA END ===

# === USE_CASES START ===
intents:
  - prediction
  - model_training
  - analytics
use_cases:
  # --- Use Case 1: Customer Classification ---
  - Customer classification (high-value vs standard)

  # --- Use Case 2: Risk Assessment ---
  - Loan default or credit risk assessment

  # --- Use Case 3: Product Recommendation ---
  - Product affinity prediction

  # --- Use Case 4: Equipment Failure ---
  - Predictive maintenance and equipment failure prediction

  # --- Use Case 5: Medical Diagnosis ---
  - Clinical outcome classification

  # --- Use Case 6: Regression ---
  - Revenue or cost estimation (regression mode)
# === USE_CASES END ===

# === PARAMETERS START ===
parameters:
  # --- Parameter 1: Database ---
  - name: database
    type: string
    # LLM-HINT: Maps to {{database}} in all SQL templates below
    required: true
    description: "Database containing the training and scoring data"
    example: "analytics_db"

  # --- Parameter 2: Training Table ---
  - name: training_table
    type: string
    # LLM-HINT: Must contain numeric features; categoricals must be pre-encoded
    required: true
    description: "Table with labeled training data"
    example: "loan_training"

  # --- Parameter 3: Scoring Table ---
  - name: scoring_table
    type: string
    # LLM-HINT: New data to score; must have same numeric feature columns as training
    required: false
    description: "Table with new data to score"
    example: "loan_applications"

  # --- Parameter 4: Input Columns ---
  - name: input_columns
    type: array[string]
    # LLM-HINT: All must be numeric; no double-quoted names; convert categoricals first
    required: true
    description: "Numeric feature columns for training"
    example: '["income", "debt_ratio", "credit_score", "years_employed", "num_accounts"]'

  # --- Parameter 5: Response Column ---
  - name: response_column
    type: string
    # LLM-HINT: Classification: must be INTEGER/SMALLINT/BYTEINT; max 500 distinct classes
    required: true
    description: "Target column to predict"
    example: "defaulted"

  # --- Parameter 6: ID Column ---
  - name: id_column
    type: string
    # LLM-HINT: Unique row identifier for Predict; cannot be NULL
    required: true
    description: "Unique identifier column"
    example: "application_id"

  # --- Parameter 7: Model Type ---
  - name: model_type
    type: string
    # LLM-HINT: 'Classification' or 'Regression'; default 'Regression'
    required: false
    default: "Regression"
    description: "Model type: Classification or Regression"
    example: "Classification"

  # --- Parameter 8: Max Depth ---
  - name: max_depth
    type: integer
    # LLM-HINT: Maximum tree depth; default 5; deeper = more complex; non-negative integer
    required: false
    default: "5"
    description: "Maximum depth for each decision tree"
    example: "7"

  # --- Parameter 9: Num Trees ---
  - name: num_trees
    type: integer
    # LLM-HINT: Total trees; default -1 (auto); if specified must be >= num AMPs; max 65536
    required: false
    default: "-1"
    description: "Number of trees to build (-1 = auto, based on AMP count)"
    example: "100"

  # --- Parameter 10: Min Node Size ---
  - name: min_node_size
    type: integer
    # LLM-HINT: Stop splitting when node has <= this many rows; default 1
    required: false
    default: "1"
    description: "Minimum number of rows in a leaf node"
    example: "5"

  # --- Parameter 11: Mtry ---
  - name: mtry
    type: integer
    # LLM-HINT: Features evaluated per split; default -1 (all); typical sqrt(p) for classification
    required: false
    default: "-1"
    description: "Number of features evaluated at each split (-1 = all features)"
    example: "3"

  # --- Parameter 12: Seed ---
  - name: seed
    type: integer
    # LLM-HINT: Random seed for reproducibility
    required: false
    description: "Random seed for reproducibility"
    example: "42"
# === PARAMETERS END ===

# === TEMPLATES START ===
templates:
  # === TRAIN_MODEL TEMPLATE ===
  # LLM-HINT: Trains a random forest; no OUT TABLE for model -- use CREATE TABLE AS to persist
  train_model:
    description: "Train a Decision Forest model for classification or regression"
    sql: |
      -- Train Decision Forest and persist model for scoring
      -- LLM-HINT: All InputColumns must be numeric; convert categoricals before calling
      -- LLM-HINT: Rows with NULL in any input column are skipped -- use TD_SimpleImpute first
      CREATE TABLE {{database}}.{{model_table}} AS (
          SELECT * FROM TD_DecisionForest(
              ON {{database}}.{{training_table}} AS InputTable PARTITION BY ANY
              USING
                  InputColumns({{input_columns_quoted}})
                  ResponseColumn('{{response_column}}')
                  ModelType('{{model_type}}')
                  MaxDepth({{max_depth}})
                  NumTrees({{num_trees}})
                  MinNodeSize({{min_node_size}})
                  Mtry({{mtry}})
                  Seed({{seed}})
          ) AS t
      ) WITH DATA;
    required_parameters:
      - database
      - training_table
      - model_table
      - input_columns_quoted
      - response_column
      - model_type
      - max_depth
      - num_trees
      - min_node_size
      - mtry
      - seed

  # === PREDICT TEMPLATE ===
  # LLM-HINT: Score new data using saved model; ModelTable is DIMENSION input
  predict:
    description: "Score new data using a trained Decision Forest model"
    sql: |
      -- Score new data with trained Decision Forest model
      -- LLM-HINT: IDColumn is required and cannot be NULL
      SELECT * FROM TD_DecisionForestPredict(
          ON {{database}}.{{scoring_table}} AS InputTable PARTITION BY ANY
          ON {{database}}.{{model_table}} AS ModelTable DIMENSION
          USING
              IDColumn('{{id_column}}')
              Accumulate('{{response_column}}')
      ) AS t;
    required_parameters:
      - database
      - scoring_table
      - model_table
      - id_column
      - response_column

  # === PREDICT_WITH_PROBABILITIES TEMPLATE ===
  # LLM-HINT: Classification only; outputs per-class probability columns
  predict_with_probabilities:
    description: "Score with class probabilities and per-tree detail (classification only)"
    sql: |
      -- Score with class probabilities for threshold tuning
      -- LLM-HINT: OutputProb is classification only; Responses requires OutputProb('true')
      SELECT * FROM TD_DecisionForestPredict(
          ON {{database}}.{{scoring_table}} AS InputTable PARTITION BY ANY
          ON {{database}}.{{model_table}} AS ModelTable DIMENSION
          USING
              IDColumn('{{id_column}}')
              OutputProb('true')
              Responses({{response_values}})
              Accumulate('{{response_column}}')
      ) AS t;
    required_parameters:
      - database
      - scoring_table
      - model_table
      - id_column
      - response_values
      - response_column

  # === TRAIN_EVALUATE TEMPLATE ===
  # LLM-HINT: Full pipeline: split -> train -> score test -> evaluate classification metrics
  train_evaluate:
    description: "Train and evaluate Decision Forest with train-test split"
    sql: |
      -- Step 1: Split data with stratification
      CREATE TABLE {{database}}.data_split AS (
          SELECT * FROM TD_TrainTestSplit(
              ON {{database}}.{{training_table}} PARTITION BY ANY
              USING
                  IDColumn('{{id_column}}')
                  TrainSize(0.75)
                  TestSize(0.25)
                  Seed({{seed}})
                  StratifyColumn('{{response_column}}')
          ) AS t
      ) WITH DATA;

      -- Step 2: Train on training rows
      CREATE TABLE {{database}}.{{model_table}} AS (
          SELECT * FROM TD_DecisionForest(
              ON (SELECT * FROM {{database}}.data_split WHERE TD_IsTrainRow = 1)
                  AS InputTable PARTITION BY ANY
              USING
                  InputColumns({{input_columns_quoted}})
                  ResponseColumn('{{response_column}}')
                  ModelType('{{model_type}}')
                  MaxDepth({{max_depth}})
                  NumTrees({{num_trees}})
                  Seed({{seed}})
          ) AS t
      ) WITH DATA;

      -- Step 3: Score test rows and evaluate
      SELECT * FROM TD_ClassificationEvaluator(
          ON (
              SELECT * FROM TD_DecisionForestPredict(
                  ON (SELECT * FROM {{database}}.data_split WHERE TD_IsTrainRow = 0)
                      AS InputTable PARTITION BY ANY
                  ON {{database}}.{{model_table}} AS ModelTable DIMENSION
                  USING
                      IDColumn('{{id_column}}')
                      Accumulate('{{response_column}}')
              ) AS t
          ) AS InputTable
          USING
              ObservationColumn('{{response_column}}')
              PredictionColumn('prediction')
              NumLabels({{num_labels}})
      ) AS t;
    required_parameters:
      - database
      - training_table
      - model_table
      - input_columns_quoted
      - response_column
      - model_type
      - id_column
      - max_depth
      - num_trees
      - seed
      - num_labels
# === TEMPLATES END ===

# === EXAMPLES START ===
examples:
  # --- Example 1: Loan Default Prediction ---
  - name: "Loan Default Prediction"
    description: "Predict loan defaults using Decision Forest classification"
    parameters:
      database: "credit"
      training_table: "loan_features"
      scoring_table: "new_applications"
      model_table: "default_forest_model"
      input_columns: ["income", "debt_ratio", "credit_score", "years_employed", "loan_amount"]
      response_column: "defaulted"
      id_column: "application_id"
      model_type: "Classification"
      max_depth: 7
      num_trees: 100
      min_node_size: 5
      mtry: 3
      seed: 42
    expected_result: |
      Model trained with 100 trees at max depth 7.
      Classification output:

        application_id | prediction | confidence_lower | confidence_upper
        A1001          | 0          | 0.92             | 0.92
        A1002          | 1          | 0.78             | 0.78

      prediction: 0 = no default, 1 = default
      confidence values reflect the proportion of trees voting for the predicted class.

  # --- Example 2: House Price Estimation ---
  - name: "House Price Estimation (Regression)"
    description: "Estimate house prices using Decision Forest regression"
    parameters:
      database: "real_estate"
      training_table: "house_features"
      scoring_table: "new_listings"
      model_table: "price_forest_model"
      input_columns: ["sqft", "bedrooms", "bathrooms", "lot_size", "year_built", "garage_spaces"]
      response_column: "sale_price"
      id_column: "property_id"
      model_type: "Regression"
      max_depth: 10
      num_trees: 200
      min_node_size: 3
      mtry: 3
      seed: 42
    expected_result: |
      Regression model trained with 200 trees.

      Predict output columns:
        property_id | prediction
        P5001       | 425000.50
        P5002       | 287500.25

      Evaluate regression quality by comparing predicted vs actual sale_price
      using MAE, RMSE, or R-squared metrics.
# === EXAMPLES END ===

# === COMMON_ERRORS START ===
common_errors:
  # --- Error 1: Non-Numeric Input ---
  - error: "InputColumns contain non-numeric types"
    cause: "TD_DecisionForest requires all input columns to be numeric. VARCHAR or DATE columns cause failure."
    solution: "Convert categoricals using TD_OneHotEncodingFit/Transform or label encoding. Convert dates to numeric features."

  # --- Error 2: NULL Values Silently Skipped ---
  - error: "Model trained on fewer rows than expected"
    cause: "Rows with NULL in any InputColumn or ResponseColumn are silently skipped."
    solution: "Run TD_SimpleImpute before training. Check row counts before and after to confirm no silent data loss."

  # --- Error 3: NumTrees Less Than AMP Count ---
  - error: "NumTrees error or unexpected tree count"
    cause: "When specified, NumTrees must be >= number of AMPs with data. Actual count = Num_AMPs * (NumTrees / Num_AMPs)."
    solution: "Use SELECT HASHAMP()+1 to get AMP count. Set NumTrees >= AMP count, or use -1 for auto."

  # --- Error 4: Classification Response Type ---
  - error: "ResponseColumn type not supported for classification"
    cause: "Classification requires INTEGER/SMALLINT/BYTEINT response column. FLOAT or VARCHAR fails."
    solution: "Cast response column to INTEGER: CAST(label AS INTEGER)."

  # --- Error 5: Model Table Not Persisted ---
  - error: "Model not available for scoring"
    cause: "TD_DecisionForest has no OUT TABLE clause. Running SELECT * without CREATE TABLE loses the model."
    solution: "Always wrap in CREATE TABLE AS (...) WITH DATA to persist the model for TD_DecisionForestPredict."
# === COMMON_ERRORS END ===

# === BEST_PRACTICES START ===
best_practices: |
  ## Decision Forest Best Practices

  ### 1. Tree Count and Depth
  - Start with NumTrees(-1) which auto-sizes based on AMP count
  - For explicit control, 50-200 trees is typical; more trees = better accuracy but slower
  - MaxDepth 5-10 is usually sufficient; very deep trees overfit
  - Use MinNodeSize to prevent overfitting (5-10 for noisy data)

  ### 2. Feature Subsampling (Mtry)
  - Default -1 uses all features at each split
  - For classification: try sqrt(num_features)
  - For regression: try num_features / 3
  - Lower Mtry increases tree diversity and often improves generalization

  ### 3. Feature Preparation
  - All columns must be numeric -- encode categoricals first
  - Use TD_SimpleImpute to handle NULLs (rows with NULLs are silently skipped)
  - Feature scaling is NOT required for tree-based models

  ### 4. Small Dataset Handling
  - For small datasets distributed across many AMPs, each AMP builds weak trees
  - Redistribute to fewer AMPs by adding a constant primary index column
  - Use CoverageFactor(1.0) to ensure each tree sees the full dataset

  ### 5. Model Persistence
  ```sql
  -- No OUT TABLE for the model -- always use CREATE TABLE AS
  CREATE TABLE db.forest_model AS (
      SELECT * FROM TD_DecisionForest(...) AS t
  ) WITH DATA;
  ```

  ### 6. Evaluation Workflow
  - Split first with TD_TrainTestSplit (stratify for classification)
  - Train on training split only
  - Score test split with TD_DecisionForestPredict
  - Use TD_ClassificationEvaluator for classification metrics
  - Compare against TD_XGBoost and TD_GLM for model selection
# === BEST_PRACTICES END ===

