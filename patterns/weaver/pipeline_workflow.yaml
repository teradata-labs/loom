name: pipeline_workflow
title: Pipeline Workflow Pattern
description: Sequential stages where each agent processes the output of the previous stage. Data flows linearly through the pipeline.
category: weaver
difficulty: intermediate
backend_type: workflow

intents:
  - weaver
use_cases:
  - "pipeline processing"
  - "sequential stages"
  - "step by step workflow"
  - "chain of agents"
  - "data processing pipeline"
  - "multi-stage analysis"

parameters:
  - name: initial_prompt
    type: string
    description: The initial input to the first stage
    required: true
    example: "Design an authentication system"
  - name: stage_count
    type: integer
    description: Number of pipeline stages
    required: false
    example: "3"

templates:
  workflow:
    description: Pipeline workflow YAML
    sql: |
      apiVersion: loom/v1
      kind: Workflow
      metadata:
        name: {{name}}-pipeline
      spec:
        type: pipeline
        initial_prompt: "{{initial_prompt}}"
        stages:
          - agent_id: stage-1-agent
            prompt_template: "Analyze and plan: {{previous}}"
          - agent_id: stage-2-agent
            prompt_template: "Implement based on plan: {{previous}}"
          - agent_id: stage-3-agent
            prompt_template: "Review and refine: {{previous}}"

examples:
  - name: design_pipeline
    description: Three-stage design pipeline
    input: "Create a pipeline for API design"
    expected_output: |
      Pipeline with initial_prompt, 3 stages using {{previous}} interpolation,
      each stage building on the previous output.

common_errors:
  - error: "Missing {{previous}} in prompt_template"
    cause: "Pipeline stages need {{previous}} to receive output from prior stage"
    fix: "Include {{previous}} in each stage's prompt_template (except optionally the first)"
  - error: "Wrong stage ordering"
    cause: "Stages execute in array order — first element runs first"
    fix: "Order stages array from first to last in execution order"
  - error: "Missing initial_prompt"
    cause: "Pipeline needs an initial_prompt to start the first stage"
    fix: "Add 'initial_prompt: \"...\"' under spec"

best_practices: |
  - Always include {{previous}} in prompt_template to pass data between stages
  - Use validation_prompt in stages for quality gates
  - Each stage agent should have a focused system_prompt for its role
  - Consider adding validation_retries for critical stages
  - Use pass_full_history: true if later stages need context from all prior stages
