apiVersion: v1
kind: ServiceAccount
metadata:
  name: bench-harness
  namespace: loom-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: bench-harness-role
  namespace: loom-bench
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bench-harness-binding
  namespace: loom-bench
subjects:
  - kind: ServiceAccount
    name: bench-harness
    namespace: loom-bench
roleRef:
  kind: Role
  name: bench-harness-role
  apiGroup: rbac.authorization.k8s.io
