apiVersion: apps/v1
kind: Deployment
metadata:
  name: loom-bench-server
  namespace: loom-bench
  labels:
    app: loom-bench-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loom-bench-server
  template:
    metadata:
      labels:
        app: loom-bench-server
    spec:
      nodeSelector:
        loom-role: server
      tolerations:
        - key: loom-role
          value: server
          effect: NoSchedule
      containers:
        - name: server
          image: loomcloudacr.azurecr.io/loom-bench:latest
          command:
            - /loom-bench-server
          args:
            - "--port=60051"
            - "--http-port=8080"
            - "--llm-latency=1ms"
            - "--llm-jitter=0"
            - "--llm-concurrency-limit=10000"
          ports:
            - name: grpc
              containerPort: 60051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GOMAXPROCS
              value: "31"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: "31"
              memory: "112Gi"
            limits:
              cpu: "31"
              memory: "112Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
