apiVersion: apps/v1
kind: Deployment
metadata:
  name: langgraph-bench-server
  namespace: loom-bench
  labels:
    app: langgraph-bench-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langgraph-bench-server
  template:
    metadata:
      labels:
        app: langgraph-bench-server
    spec:
      # Same node pool and same resource limits as the Loom server pod.
      # Deploy AFTER tearing down the Loom server — they cannot coexist
      # on the same node due to Guaranteed QoS resource reservations.
      nodeSelector:
        loom-role: server
      tolerations:
        - key: loom-role
          value: server
          effect: NoSchedule
      containers:
        - name: server
          image: loomcloudacr.azurecr.io/langgraph-bench:latest
          args:
            - "--port=50051"
            - "--llm-latency-ms=1"
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: GOMAXPROCS
              value: "31"
          resources:
            requests:
              cpu: "31"
              memory: "112Gi"
            limits:
              cpu: "31"
              memory: "112Gi"
