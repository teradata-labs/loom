syntax = "proto3";

package loom.v1;

option go_package = "github.com/teradata-labs/loom/gen/go/loom/v1;loomv1";

// PermissionMode controls how the agent handles tool execution permissions.
// This enum is the canonical definition; loom.proto references it directly.
// WorkflowExecutionPolicy.permission_mode maps to these values via int32.
enum PermissionMode {
  // Unspecified — use the agent's configured default.
  PERMISSION_MODE_UNSPECIFIED = 0;

  // Ask the user before executing each tool call (default behavior).
  PERMISSION_MODE_ASK_BEFORE = 1;

  // Automatically execute all tool calls without asking (YOLO / autonomous mode).
  PERMISSION_MODE_AUTO_ACCEPT = 2;

  // Generate an execution plan and wait for user approval before running any tools.
  PERMISSION_MODE_PLAN = 3;
}
