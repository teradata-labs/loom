syntax = "proto3";

package loom.v1;

import "google/api/annotations.proto";
import "loom/v1/agent_config.proto";
import "loom/v1/orchestration.proto";
import "loom/v1/skill.proto";
import "loom/v1/task.proto";

option go_package = "github.com/teradata-labs/loom/gen/go/loom/v1;loomv1";

// =============================================================================
// LoomWorkflow — the core capability bundle
// =============================================================================

// LoomWorkflow is a declarative capability bundle that assembles skills, agents,
// MCP tools, and tasks around a specific Job To Be Done (JTBD).
//
// Distinct from WorkflowPattern (orchestration.proto), which describes HOW agents
// collaborate (pipeline, debate, swarm, etc.). LoomWorkflow describes WHAT capability
// set is deployed and WHY — the full context of a job, not just its execution topology.
//
// A LoomWorkflow can be used standalone (activate, run, deactivate) or referenced
// inside a LoomPlugin for distribution and reuse across deployments.
//
// Immutable fields (after WORKFLOW_STATUS_ACTIVE): meta.id, meta.name, jtbd.title,
// jtbd.outcome, jtbd.success_criteria, jtbd.functional_jobs, jtbd.domain, jtbd.scope.
message LoomWorkflow {
  // Identity, version, and discovery metadata.
  WorkflowMeta meta = 1;

  // The job this workflow serves — why it exists and what success looks like.
  // Split into definitional (immutable after ACTIVE) and contextual defaults.
  JobToBeDone jtbd = 2;

  // Skills to activate when this workflow runs. Skills inject domain knowledge,
  // constraints, and task templates into participating agents.
  repeated WorkflowSkillRef skills = 3;

  // Agents participating in this workflow and their roles.
  repeated WorkflowAgentRef agents = 4;

  // MCP tool groups scoped to this workflow. Controls which external tools are
  // available to which agents during execution.
  repeated WorkflowMCPGroup mcp_groups = 5;

  // Task blueprint: the initial task structure created when this workflow activates.
  // Steps may be authored explicitly or generated via LLM decomposition.
  WorkflowTaskBlueprint task_blueprint = 6;

  // Ephemeral agent policies: conditions under which the workflow dynamically
  // spawns short-lived sub-agents (judges, domain experts, moderators, etc.).
  repeated EphemeralAgentPolicy ephemeral_policies = 7;

  // Orchestration pattern governing how agents in this workflow collaborate.
  // Optional — when absent, the primary agent executes without coordination.
  WorkflowPattern orchestration = 8;

  // What activates this workflow (slash command, schedule, API call, or event).
  WorkflowTrigger trigger = 9;

  // Runtime constraints: timeouts, cost budgets, concurrency limits, and retries.
  WorkflowExecutionPolicy execution = 10;

  // Expected outputs: what this workflow produces and where they go.
  repeated WorkflowOutput outputs = 11;

  // Lifecycle state: current status and activation history.
  WorkflowLifecycle lifecycle = 12;
}

// =============================================================================
// WorkflowMeta
// =============================================================================

// WorkflowMeta holds identity, versioning, and discovery metadata for a LoomWorkflow.
message WorkflowMeta {
  // Stable UUID. Assigned on first registration; never changes.
  string id = 1;

  // Machine-readable identifier. Used in slash commands and API references.
  // Example: "teradata-query-optimizer". Unique within a deployment.
  string name = 2;

  // Human-readable display name.
  string title = 3;

  // What this workflow does and when to use it.
  string description = 4;

  // Semantic version (e.g. "1.0.0"). Increment on breaking changes to JTBD or outputs.
  string version = 5;

  // Primary domain this workflow targets (e.g. "teradata", "analytics", "data-engineering").
  string domain = 6;

  // Arbitrary key-value labels for filtering and routing.
  map<string, string> labels = 7;

  // Author or owning team.
  string author = 8;

  // Unix epoch ms: when this workflow was first registered.
  int64 created_at_ms = 9;

  // Unix epoch ms: when this workflow definition was last modified.
  int64 updated_at_ms = 10;

  // Parent workflow ID for hierarchical composition. Empty if top-level.
  string parent_workflow_id = 11;

  // Free-form tags for search and discovery.
  repeated string tags = 12;

  // Plugin ID that installed this workflow. Empty for standalone workflows.
  // Set by the server on plugin install; read-only after that.
  string source_plugin_id = 13;

  // Monotonically increasing counter incremented on every activation.
  // Used for optimistic-locking CAS in ActivateWorkflowRequest.expected_generation
  // to prevent split-brain double-activations.
  int64 activation_generation = 14;
}

// =============================================================================
// JobToBeDone
// =============================================================================

// JobToBeDone captures the intent, context, and success criteria of a workflow.
// Modelled after the JTBD framework: a job is what a user is trying to accomplish,
// defined by its outcome — not the steps taken to get there.
//
// Fields are split into two groups:
//   Definitional (immutable after WORKFLOW_STATUS_ACTIVE):
//     title, outcome, success_criteria, functional_jobs, domain, scope, personas
//   Contextual defaults (mutable at any time; overridden per-activation):
//     default_persona, default_context_vars
//
// JTBD data is used for:
//   - Skill and agent routing (domain + functional_jobs)
//   - Task decomposition (success_criteria → acceptance criteria)
//   - LLM prompt injection (outcome + context_vars)
//   - Evaluation (success_criteria → judge rubric)
message JobToBeDone {
  // Short JTBD statement. Example: "Optimize slow Teradata queries for production load"
  // Immutable after ACTIVE.
  string title = 1;

  // Full description of the job including background and motivation.
  string description = 2;

  // What the user has when the job is complete. Drives acceptance criteria.
  // Example: "A reviewed SQL rewrite with EXPLAIN plan validation and cost estimate"
  // Immutable after ACTIVE.
  string outcome = 3;

  // Measurable conditions that must hold when the job is done.
  // Maps directly to Task.acceptance_criteria and OutputPolicy.acceptance_criteria.
  // Immutable after ACTIVE.
  repeated string success_criteria = 4;

  // Domain of expertise required to do this job (e.g. "teradata", "sql", "ml-ops").
  // Immutable after ACTIVE.
  string domain = 5;

  // Discrete functional sub-jobs that make up this JTBD.
  // Example: ["parse query plan", "identify bottlenecks", "suggest rewrites", "validate changes"]
  // Immutable after ACTIVE.
  repeated string functional_jobs = 6;

  // Temporal scope of this job — one query, a multi-turn session, a project, or ongoing.
  // Immutable after ACTIVE.
  JobScope scope = 7;

  // Personas that are valid actors for this JTBD (e.g. ["DBA", "data analyst"]).
  // When non-empty, ActivateWorkflowRequest.persona must match one of these values.
  // Empty list means any persona is accepted.
  // Immutable after ACTIVE.
  repeated string personas = 8;

  // Default persona used when ActivateWorkflowRequest.persona is empty.
  // Used to tune skill prompt tone and depth.
  string default_persona = 9;

  // Default context variables for template interpolation in skill prompts and task blueprints.
  // Keys are variable names; values are defaults (overridden at activation time via
  // ActivateWorkflowRequest.context).
  map<string, string> default_context_vars = 10;
}

// JobScope describes the temporal extent and continuity of a JTBD.
enum JobScope {
  JOB_SCOPE_UNSPECIFIED = 0;

  // A single query or request. Workflow activates, runs, and is done.
  JOB_SCOPE_QUERY = 1;

  // A multi-turn conversation session. Workflow persists across turns until closed.
  JOB_SCOPE_SESSION = 2;

  // A multi-session project. Workflow persists across sessions with shared memory.
  JOB_SCOPE_PROJECT = 3;

  // Continuous monitoring or background operation. Never deactivates autonomously.
  JOB_SCOPE_CONTINUOUS = 4;
}

// =============================================================================
// WorkflowSkillRef
// =============================================================================

// WorkflowSkillRef links a named skill into the workflow and configures how it activates.
// This is a reference — the skill must already exist in the skill registry.
message WorkflowSkillRef {
  // Name of the skill to activate (must match Skill.metadata.name).
  string skill_name = 1;

  // Activation mode override. When UNSPECIFIED, uses the skill's own default.
  SkillActivationMode activation_mode = 2;

  // Agent IDs that receive this skill. Empty = inject into all agents in this workflow.
  repeated string target_agent_ids = 3;

  // If true, workflow activation fails when the skill cannot be found.
  bool required = 4;

  // Activation priority relative to other skills in this workflow. Higher = first.
  int32 priority = 5;

  // Runtime config overrides applied on top of the skill's base configuration.
  // Keys are skill config field paths (e.g. "max_prompt_tokens").
  map<string, string> config_overrides = 6;

  // Minimum semver version of the skill required (empty = any version).
  string min_version = 7;
}

// =============================================================================
// WorkflowAgentRef
// =============================================================================

// WorkflowAgentRef binds an existing agent into the workflow with a specific role
// and binding mode.
message WorkflowAgentRef {
  // ID of an existing registered agent.
  string agent_id = 1;

  // Semantic role within this workflow (e.g. "primary", "judge", "domain-expert", "reviewer").
  // Used by orchestration patterns (debate moderator, fork/join merger, etc.).
  string role = 2;

  // How the agent is attached to this workflow.
  WorkflowAgentBinding binding = 3;

  // Agent config field overrides applied only while this workflow is active.
  // Keys are dot-path field names (e.g. "behavior.max_iterations").
  map<string, string> config_overrides = 4;

  // Additional skill names injected into this agent beyond the workflow-level skill refs.
  repeated string additional_skills = 5;

  // When true, this agent is the primary executor. Exactly one agent should be primary.
  bool primary = 6;
}

// WorkflowAgentBinding controls the lifecycle of an agent relative to its workflow.
enum WorkflowAgentBinding {
  WORKFLOW_AGENT_BINDING_UNSPECIFIED = 0;

  // Use an existing long-lived agent. It persists after the workflow ends.
  WORKFLOW_AGENT_BINDING_PERSISTENT = 1;

  // Spawn a new agent for this workflow and destroy it when the workflow ends.
  WORKFLOW_AGENT_BINDING_EPHEMERAL = 2;

  // Borrow an agent from a pool; return it when the workflow ends.
  WORKFLOW_AGENT_BINDING_BORROWED = 3;
}

// =============================================================================
// WorkflowMCPGroup
// =============================================================================

// WorkflowMCPGroup scopes a set of MCP tools to specific agents in the workflow.
// Allows different agents to have access to different external tool sets.
message WorkflowMCPGroup {
  // Logical name for this tool group (e.g. "database-tools", "code-execution").
  string group_name = 1;

  // MCP server names whose tools are included. Servers must already be registered.
  // Optional — if empty but tool_names is non-empty, the runtime discovers which
  // registered server provides each named tool.
  repeated string server_names = 2;

  // Specific tool names to expose. Empty = expose all tools from server_names.
  repeated string tool_names = 3;

  // Agent IDs that get access to this group. Empty = all agents in this workflow.
  repeated string agent_ids = 4;

  // If true, workflow activation fails when any server in server_names is unreachable
  // (or when a named tool cannot be resolved to a server).
  bool required = 5;
}

// =============================================================================
// WorkflowTaskBlueprint
// =============================================================================

// WorkflowTaskBlueprint defines the initial task structure created when the workflow
// activates. Steps can be authored explicitly (reusing SkillTaskTemplate.Step) or
// generated by the LLM decomposer using the JTBD outcome as the decomposition goal.
message WorkflowTaskBlueprint {
  // Display name for the task board created for this workflow.
  string board_name = 1;

  // Task decomposition strategy. Controls ordering and parallelism of generated tasks.
  DecomposeStrategy strategy = 2;

  // Explicit task steps. When non-empty, the decomposer is skipped.
  // Reuses SkillTaskTemplate.Step: title, objective, acceptance_criteria,
  // category, priority, id, depends_on_ids, estimated_effort.
  repeated SkillTaskTemplate.Step steps = 3;

  // When true and steps is empty, invoke the LLM decomposer to generate tasks.
  bool auto_decompose = 4;

  // Go template for the decomposer prompt. Available vars: .JTBD, .Domain, .Outcome.
  // When empty, the decomposer uses the JTBD outcome directly.
  string decompose_goal_template = 5;

  // Maximum number of tasks the blueprint may emit. Default: 8.
  int32 max_tasks = 6;

  // When true, emit tasks immediately on workflow activation.
  // When false, emit on first Weave call (lazy emission).
  bool emit_on_activation = 7;

  // Board configuration: WIP limits, context budget, default decomposition depth.
  TaskBoardConfig board_config = 8;
}

// =============================================================================
// WorkflowTrigger
// =============================================================================

// WorkflowTrigger controls what activates a LoomWorkflow.
// Exactly one trigger variant must be set.
message WorkflowTrigger {
  oneof trigger {
    // Activate via slash command or keyword match in a Weave query.
    WorkflowSlashTrigger slash = 1;

    // Activate on a cron schedule. Reuses ScheduleConfig from orchestration.proto.
    ScheduleConfig schedule = 2;

    // Activate when a named event is published to the message bus.
    WorkflowEventTrigger event = 3;

    // Activate only via explicit ActivateWorkflow RPC call.
    WorkflowAPITrigger api = 4;
  }
}

// WorkflowSlashTrigger activates a workflow via slash command or keyword match.
message WorkflowSlashTrigger {
  // Slash commands that activate this workflow (e.g. ["/analyze-query"]).
  repeated string commands = 1;

  // Keywords that trigger activation when detected in a Weave query.
  repeated string keywords = 2;

  // Minimum confidence score required for keyword-based activation (0.0–1.0).
  float min_confidence = 3;
}

// WorkflowEventTrigger activates a workflow when a specific event is published on the bus.
message WorkflowEventTrigger {
  // Event type name to subscribe to (e.g. "query.slow_detected", "task.board.full").
  string event_type = 1;

  // CEL expression for filtering events. Empty = match all events of event_type.
  // Available fields depend on the event schema.
  string filter_expression = 2;

  // Static metadata attached to the activation context when triggered by this event.
  map<string, string> event_metadata = 3;
}

// WorkflowAPITrigger marks that this workflow is only activated via explicit API call.
// No automatic triggering from slash commands, keywords, schedules, or events.
message WorkflowAPITrigger {}

// =============================================================================
// WorkflowExecutionPolicy
// =============================================================================

// WorkflowExecutionPolicy constrains runtime resource usage for a LoomWorkflow.
message WorkflowExecutionPolicy {
  // Maximum wall-clock seconds before the workflow execution is forcibly terminated.
  int32 timeout_seconds = 1;

  // Maximum USD to spend on LLM calls across all agents in this workflow.
  double cost_budget_usd = 2;

  // Maximum conversation turns per agent per activation.
  int32 max_turns_per_agent = 3;

  // Maximum number of agents running concurrently during this workflow.
  int32 max_concurrent_agents = 4;

  // Tool permission mode for agents in this workflow.
  // Maps to loom.v1.PermissionMode (permissions.proto):
  //   0 = UNSPECIFIED (each agent uses its own configured mode)
  //   1 = ASK_BEFORE
  //   2 = AUTO_ACCEPT
  //   3 = PLAN
  // Stored as int32 to avoid a circular proto import dependency; callers
  // should cast to PermissionMode for type-safe comparisons.
  int32 permission_mode = 5;

  // When true, the first agent or task failure terminates the entire workflow.
  bool fail_fast = 6;

  // Maximum retries for transient failures before the workflow errors out.
  int32 max_retries = 7;
}

// =============================================================================
// WorkflowOutput
// =============================================================================

// WorkflowOutput declares an artifact or result this workflow is expected to produce.
// The destination oneof controls where the output is persisted or routed.
message WorkflowOutput {
  // Machine-readable output name (e.g. "optimized_query", "performance_report").
  string name = 1;

  // Human-readable description of what this output contains.
  string description = 2;

  // JSON Schema describing the expected output structure. Empty = unstructured text.
  string schema_json = 3;

  // Output type determines serialization and routing behaviour.
  WorkflowOutputType type = 4;

  // When true, workflow execution is considered failed if this output is not produced.
  bool required = 5;

  // Where to persist or route this output. Defaults to inline (WeaveResponse)
  // when no destination is set.
  oneof destination {
    // Return output inline in the WeaveResponse.
    WorkflowOutputInline inline = 6;

    // Store as a named artifact with an ID prefix.
    WorkflowOutputArtifact artifact = 7;

    // Write to a file at the given path.
    WorkflowOutputFile file = 8;

    // Write to a database table (e.g. Teradata, Postgres).
    WorkflowOutputTableRef table_ref = 9;

    // Publish to a named message bus topic.
    WorkflowOutputBusTopic bus_topic = 10;
  }
}

// WorkflowOutputType classifies the expected output of a workflow.
enum WorkflowOutputType {
  WORKFLOW_OUTPUT_TYPE_UNSPECIFIED = 0;
  WORKFLOW_OUTPUT_TYPE_TEXT = 1;
  WORKFLOW_OUTPUT_TYPE_JSON = 2;
  WORKFLOW_OUTPUT_TYPE_SQL = 3;
  WORKFLOW_OUTPUT_TYPE_ARTIFACT = 4;
  WORKFLOW_OUTPUT_TYPE_TASK_BOARD = 5;
  WORKFLOW_OUTPUT_TYPE_REPORT = 6;
  WORKFLOW_OUTPUT_TYPE_CODE = 7;
  WORKFLOW_OUTPUT_TYPE_CHART = 8;
}

// WorkflowOutputInline returns the output inline in the WeaveResponse.
// No additional configuration is required.
message WorkflowOutputInline {}

// WorkflowOutputArtifact stores output as a named artifact in the artifact store.
message WorkflowOutputArtifact {
  // Prefix for the artifact ID (e.g. "query-opt-"). The server appends a unique suffix.
  string id_prefix = 1;
}

// WorkflowOutputFile writes output to a file at the given path on the server.
message WorkflowOutputFile {
  // Absolute path on the server filesystem where the output will be written.
  string path = 1;
}

// WorkflowOutputTableRef writes output to a database table.
message WorkflowOutputTableRef {
  // Target database name (e.g. Teradata database or Postgres schema).
  string database = 1;

  // Target table name. If the table does not exist, the server will attempt
  // to create it according to the output schema_json.
  string table = 2;
}

// WorkflowOutputBusTopic publishes output to a named message bus topic.
message WorkflowOutputBusTopic {
  // Topic name on the configured message bus.
  string topic = 1;
}

// =============================================================================
// WorkflowLifecycle
// =============================================================================

// WorkflowLifecycle tracks the current state and activation history of a LoomWorkflow.
// This message is read-only — modified by the server during activate/deactivate/run.
message WorkflowLifecycle {
  // Current lifecycle status.
  WorkflowStatus status = 1;

  // Unix epoch ms: when the workflow was last activated.
  int64 activated_at_ms = 2;

  // Unix epoch ms: when the workflow was last deactivated. Zero if currently active.
  int64 deactivated_at_ms = 3;

  // Number of sessions currently holding an active activation of this workflow.
  // Use ListWorkflowSessions to retrieve the actual session IDs.
  int32 active_session_count = 4;

  // Execution ID of the currently running workflow execution. Empty if not running.
  string active_execution_id = 5;

  // Number of times this workflow has been activated since registration.
  int64 activation_count = 6;

  // Last error encountered during activation or execution. Empty if no errors.
  string last_error = 7;

  // Unix epoch ms deadline set by the reaper for forced termination of the active
  // execution. Zero if no deadline is set (no timeout or not currently running).
  int64 execution_timeout_at_ms = 8;
}

// WorkflowStatus represents the lifecycle state of a LoomWorkflow definition.
enum WorkflowStatus {
  WORKFLOW_STATUS_UNSPECIFIED = 0;

  // Created but not yet validated or activated.
  WORKFLOW_STATUS_DRAFT = 1;

  // Registered and available for activation.
  WORKFLOW_STATUS_ACTIVE = 2;

  // Currently executing (at least one active execution).
  WORKFLOW_STATUS_RUNNING = 3;

  // Temporarily suspended. Can be resumed via ActivateWorkflow.
  WORKFLOW_STATUS_PAUSED = 4;

  // Superseded by a newer version. Existing executions complete; no new activations.
  WORKFLOW_STATUS_DEPRECATED = 5;

  // Removed from active inventory. Definition preserved for audit.
  WORKFLOW_STATUS_ARCHIVED = 6;
}

// =============================================================================
// LoomPlugin — distribution format
// =============================================================================

// LoomPlugin is a descriptor that bundles references to workflows, skills, agents,
// and MCP tools for distribution and installation across Loom deployments.
//
// A plugin is the unit of distribution: it references everything needed to deliver
// a JTBD capability, but does NOT embed the full definitions — those live in their
// own registries. After install, the server populates the installed_* fields.
//
// Validation rule: a plugin with ALL of workflow_refs, skill_refs, agent_refs, and
// mcp_tool_refs empty is invalid. At least one ref field must be non-empty.
//
// Example: a "Teradata Performance" plugin references:
//   - workflow_refs: [query-optimizer>=1.0, plan-analyzer>=1.0]
//   - skill_refs: [teradata-sql>=2.0, explain-plan>=1.0]
//   - agent_refs: [dba-agent]
//   - required_tool_names: ["td_explain", "td_statistics"]
message LoomPlugin {
  // Plugin identity, versioning, and provenance.
  PluginMeta meta = 1;

  // Workflows referenced (and optionally bundled) by this plugin.
  repeated WorkflowRef workflow_refs = 2;

  // Skills referenced (and optionally bundled) by this plugin.
  repeated SkillRef skill_refs = 3;

  // Agents referenced by this plugin.
  repeated AgentRef agent_refs = 4;

  // MCP tools explicitly referenced by this plugin.
  repeated MCPToolRef mcp_tool_refs = 5;

  // Skill names this plugin declares as required but does not bundle.
  // The install check will fail if any of these skills are absent.
  repeated string required_skill_names = 6;

  // MCP tool names this plugin declares as required but does not bundle.
  // The install check will fail if any of these tools cannot be resolved.
  repeated string required_tool_names = 7;

  // Installation behaviour: what gets auto-configured when the plugin is installed.
  PluginInstallPolicy install = 8;

  // Server-populated after successful install: IDs of workflows installed.
  repeated string installed_workflow_ids = 9;

  // Server-populated after successful install: names of skills installed.
  repeated string installed_skill_names = 10;

  // Server-populated after successful install: IDs of agents installed.
  repeated string installed_agent_ids = 11;

  // Unified invocation surface for this plugin. Defines the slash commands and
  // keywords that activate the plugin regardless of what components it contains.
  // When a trigger fires, ActivatePlugin is called; the runtime then wires
  // every component (workflows, skills, MCP tools, agents) in sequence.
  PluginTrigger trigger = 12;

  // Default binding mode applied when this plugin is declared in
  // AgentConfig.plugin_ids. Controls how the runtime activates the plugin at
  // session start. Defaults to LAZY (trigger-driven) when unspecified.
  PluginBindingMode default_binding_mode = 13;

  // Controls what happens at activation time when a referenced component
  // cannot be resolved (e.g. a skill was deleted after install).
  // Unspecified defaults: required missing → FAIL, optional missing → SKIP_WARN.
  RefResolutionPolicy resolution = 14;
}

// PluginMeta holds identity, versioning, and provenance for a LoomPlugin.
message PluginMeta {
  // Stable UUID. Assigned on first registration; never changes.
  string id = 1;

  // Unique machine-readable identifier (e.g. "teradata-performance").
  string name = 2;

  // Human-readable display name.
  string title = 3;

  // What this plugin does and what problems it solves.
  string description = 4;

  // Semantic version string (e.g. "1.2.0").
  string version = 5;

  // Author or owning team.
  string author = 6;

  // Domains this plugin targets (e.g. ["teradata", "sql", "performance"]).
  repeated string domains = 7;

  // Arbitrary key-value labels for discovery and filtering.
  map<string, string> labels = 8;

  // Installation status of this plugin in the current deployment.
  PluginStatus status = 9;

  // IDs or names of other plugins this plugin depends on.
  repeated string dependencies = 10;

  // URL of the source repository or documentation.
  string source_url = 11;

  // Minimum Loom server version required (semver, e.g. "1.2.0").
  string min_loom_version = 12;

  // Capability category for listing and discovery.
  // Valid values: "domain" | "integration" | "meta" | "analysis" | "utility".
  string type = 13;

  // Risk classification for the combined plugin capability surface.
  // Valid values: "low" | "medium" | "high" | "restricted".
  // Activation is blocked for "high" and "restricted" when require_approval=true.
  // Set independently of component risk levels — a plugin may combine low-risk
  // components that together represent a higher-risk capability surface.
  string risk_level = 14;

  // When true, ActivatePlugin requires explicit approval for risk_level high/restricted.
  // Mirrors the skill-level approval gate in the agent runtime (agent.go:IsHighRisk).
  bool require_approval = 15;
}

// PluginTrigger is the unified invocation surface for a LoomPlugin.
// A single trigger definition activates the whole plugin — regardless of whether
// it contains workflows, skills, MCP tools, agents, or a mix.
message PluginTrigger {
  // Slash commands that activate this plugin: e.g. ["/sql-optimizer", "/td-perf"].
  repeated string slash_commands = 1;

  // Keywords for auto-detection from the user's message.
  repeated string keywords = 2;

  // Minimum confidence for keyword-based activation (default: 0.7).
  float min_confidence = 3;

  // Short description surfaced to the router LLM to aid discovery.
  string description = 4;
}

// PluginBindingMode controls how the runtime activates a plugin that is
// declared in AgentConfig.plugin_ids (i.e. permanently bound to an agent).
enum PluginBindingMode {
  PLUGIN_BINDING_MODE_UNSPECIFIED = 0;

  // Activate the plugin at the start of every session for this agent.
  // Equivalent to calling ActivatePlugin on each new session automatically.
  PLUGIN_BINDING_MODE_EAGER = 1;

  // Activate only when a trigger fires (slash command or keyword match).
  // Skills and tools are registered but NOT injected until the trigger fires.
  PLUGIN_BINDING_MODE_LAZY = 2;

  // Force the plugin active on every turn. Overrides the plugin's own trigger.
  // Use for essential infrastructure plugins (e.g. a security policy plugin).
  PLUGIN_BINDING_MODE_ALWAYS = 3;
}

// PluginActivation records the runtime state of an active plugin in a session.
// Created by ActivatePlugin; updated by DeactivatePlugin.
message PluginActivation {
  // Server-assigned activation UUID.
  string id = 1;

  // Plugin that was activated.
  string plugin_id = 2;

  // Session in which the plugin is active.
  string session_id = 3;

  // Agent that activated the plugin.
  string agent_id = 4;

  // Epoch ms when the plugin became active.
  int64 activated_at_ms = 5;

  // IDs of workflows activated by this plugin activation.
  repeated string activated_workflow_ids = 6;

  // Names of skills injected by this plugin activation.
  repeated string activated_skill_names = 7;

  // MCP server names connected by this plugin activation.
  repeated string activated_mcp_servers = 8;

  // IDs of agents made available by this plugin activation.
  repeated string activated_agent_ids = 9;

  // Idempotency key supplied in the request. Repeated activations with the
  // same key return the same PluginActivation without re-wiring components.
  string activation_key = 10;

  // Current lifecycle state of this activation.
  PluginActivationStatus status = 11;
}

// PluginActivationStatus is the lifecycle state of a PluginActivation.
enum PluginActivationStatus {
  PLUGIN_ACTIVATION_STATUS_UNSPECIFIED = 0;

  // Plugin is wired and active in the session.
  PLUGIN_ACTIVATION_STATUS_ACTIVE = 1;

  // Graceful deactivation in progress (drain).
  PLUGIN_ACTIVATION_STATUS_DEACTIVATING = 2;

  // Plugin has been deactivated; components detached.
  PLUGIN_ACTIVATION_STATUS_DEACTIVATED = 3;

  // Activation failed; components may be partially wired.
  PLUGIN_ACTIVATION_STATUS_FAILED = 4;
}

// =============================================================================
// Ref types — lightweight descriptors for plugin dependencies
// =============================================================================

// WorkflowRef is a reference to a workflow by name, with an optional version constraint.
message WorkflowRef {
  // Workflow name (matches WorkflowMeta.name).
  string name = 1;

  // Minimum semver version required (empty = any version).
  string min_version = 2;

  // When true, install/activation fails if this workflow cannot be resolved.
  // When false, the missing workflow is skipped per RefResolutionPolicy.
  bool required = 3;

  // Human-readable description of what this workflow does in this plugin's context.
  // Surfaced in validation output and plugin listings.
  string description = 4;
}

// SkillRef is a reference to a skill by name, with an optional version constraint.
message SkillRef {
  // Skill name (matches SkillMetadata.name).
  string name = 1;

  // Minimum semver version required (empty = any version).
  string min_version = 2;

  // When true, install/activation fails if this skill cannot be resolved.
  bool required = 3;

  // Human-readable description of what this skill does in this plugin's context.
  // Also used as the generation prompt when synthesize=true and the skill is missing.
  string description = 4;

  // When true and the skill cannot be resolved, the runtime generates a new skill
  // using description as the goal. The generated skill is marked
  // SKILL_STATUS_AUTO_GENERATED with reduced confidence (0.5) and is scoped to
  // this plugin (deleted on UninstallPlugin). Requires description to be non-empty.
  bool synthesize = 5;
}

// AgentRef is a reference to an agent by ID with an optional role annotation.
message AgentRef {
  // Agent UUID or name.
  string id = 1;

  // Semantic role of this agent in the plugin context (e.g. "primary", "judge").
  string role = 2;

  // When true, install/activation fails if this agent cannot be resolved.
  bool required = 3;

  // Human-readable description of what this agent does in this plugin's context.
  // Also used as the system-prompt seed when synthesize=true and the agent is missing.
  string description = 4;

  // When true and the agent cannot be resolved, the runtime creates a minimal agent
  // using description as the system prompt. The synthesized agent is scoped to this
  // plugin (deleted on UninstallPlugin). Requires description to be non-empty.
  bool synthesize = 5;
}

// MCPToolRef is a reference to a specific MCP tool, optionally scoped to a server.
// server_name is optional — if empty, the runtime discovers which registered server
// provides the named tool.
message MCPToolRef {
  // Tool name as exposed by the MCP server.
  string tool_name = 1;

  // MCP server name (optional). When empty, the runtime resolves which server
  // provides this tool by scanning registered servers.
  string server_name = 2;

  // When true, install/activation fails if this tool cannot be resolved to a server.
  bool required = 3;

  // Human-readable description of what this tool does in this plugin's context.
  string description = 4;
}

// =============================================================================
// Reference resolution — activation-time failure policy
// =============================================================================

// RefActivationFailureMode controls what happens at ActivatePlugin time when a
// referenced component (skill, workflow, agent, MCP tool) cannot be resolved.
enum RefActivationFailureMode {
  REF_ACTIVATION_FAILURE_MODE_UNSPECIFIED = 0;

  // Abort the entire ActivatePlugin call. No components are wired.
  REF_ACTIVATION_FAILURE_MODE_FAIL = 1;

  // Skip the unresolvable component; continue wiring remaining components.
  // Adds a ValidationIssue warning to ActivatePluginResponse.warnings.
  REF_ACTIVATION_FAILURE_MODE_SKIP_WARN = 2;

  // Skip silently. No warning is emitted. Use for truly optional capabilities.
  REF_ACTIVATION_FAILURE_MODE_SKIP_SILENT = 3;
}

// RefResolutionPolicy governs activation-time resolution failures for a plugin.
// Covers the case where a component existed at install time but was removed
// (or updated to an incompatible version) before activation.
message RefResolutionPolicy {
  // Behaviour when a required=true ref cannot be resolved at activation time.
  // Unspecified defaults to FAIL.
  RefActivationFailureMode on_required_missing = 1;

  // Behaviour when a required=false ref cannot be resolved at activation time.
  // Unspecified defaults to SKIP_WARN.
  RefActivationFailureMode on_optional_missing = 2;

  // When true, re-attempt synthesis for refs with synthesize=true that were
  // generated at install time but have since been deleted. Requires the
  // original description to be present on the ref.
  bool resynthesize_on_activation = 3;
}

// =============================================================================
// PluginInstallPolicy
// =============================================================================

// PluginInstallPolicy controls what gets automatically configured when a plugin
// is installed via InstallPlugin.
message PluginInstallPolicy {
  // Automatically register referenced skills into the skill registry.
  bool auto_register_skills = 1;

  // Automatically register and start referenced MCP servers.
  bool auto_configure_mcp = 2;

  // Create a default agent from the plugin's agent_refs (first primary agent_ref).
  bool create_default_agent = 3;

  // Name for the default agent created when create_default_agent is true.
  // When empty, uses the plugin name.
  string default_agent_name = 4;

  // Default config values applied to agents during installation.
  // Keys are dot-path field names. These are overridden by per-agent values.
  map<string, string> config_defaults = 5;

  // When true, overwrite existing skills with the same name during install.
  // When false, skip skills that already exist.
  bool overwrite_skills = 6;

  // When true, overwrite existing agents with the same ID/name during install.
  // When false, skip agents that already exist.
  bool overwrite_agents = 7;

  // When true, overwrite existing workflows with the same name during install.
  // When false, skip workflows that already exist.
  bool overwrite_workflows = 8;

  // When true, overwrite existing MCP server registrations with the same name.
  // When false, skip MCP servers that are already registered.
  bool overwrite_mcp_servers = 9;
}

// PluginStatus tracks the installation state of a LoomPlugin.
enum PluginStatus {
  PLUGIN_STATUS_UNSPECIFIED = 0;

  // Known but not installed in this deployment.
  PLUGIN_STATUS_AVAILABLE = 1;

  // Installed (skills registered, agents created, MCP servers configured).
  PLUGIN_STATUS_INSTALLED = 2;

  // Installed and at least one workflow is currently active.
  PLUGIN_STATUS_ACTIVE = 3;

  // Superseded by a newer version.
  PLUGIN_STATUS_DEPRECATED = 4;

  // Installation failed. See last_error for details.
  PLUGIN_STATUS_ERROR = 5;
}

// =============================================================================
// Validation
// =============================================================================

// ValidationIssue describes a single problem found during workflow or plugin validation.
message ValidationIssue {
  // Dot-path to the field that has the issue (e.g. "meta.name", "skills[0].skill_name").
  string field = 1;

  // Human-readable description of the problem.
  string message = 2;

  // Severity of the issue.
  ValidationSeverity severity = 3;
}

// ValidationSeverity classifies the impact of a validation issue.
enum ValidationSeverity {
  VALIDATION_SEVERITY_UNSPECIFIED = 0;

  // Fatal: the workflow or plugin cannot be activated or installed.
  VALIDATION_SEVERITY_ERROR = 1;

  // Non-fatal: activation will proceed but some capability may be degraded.
  VALIDATION_SEVERITY_WARNING = 2;

  // Informational: no impact on function.
  VALIDATION_SEVERITY_INFO = 3;
}

// =============================================================================
// CapabilityService
// =============================================================================

// CapabilityService manages LoomWorkflow definitions and LoomPlugin installation.
//
// Named "CapabilityService" rather than "WorkflowService" to avoid collision with
// the existing WorkflowService RPCs in LoomService (workflow execution/streaming).
// CapabilityService handles capability *definitions* (CRUD, activation, plugins);
// LoomService handles capability *execution* (Weave, Stream, ExecuteWorkflow).
service CapabilityService {

  // ─── Workflow CRUD ───────────────────────────────────────────────────────────

  // RegisterWorkflow registers a new LoomWorkflow definition.
  // The workflow is created in DRAFT status and must be validated before activation.
  rpc RegisterWorkflow(RegisterWorkflowRequest) returns (RegisterWorkflowResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/workflows"
      body: "*"
    };
  }

  // GetWorkflow retrieves a workflow by UUID or name.
  rpc GetWorkflow(GetWorkflowRequest) returns (LoomWorkflow) {
    option (google.api.http) = {get: "/v1/capabilities/workflows/{workflow_id}"};
  }

  // ListWorkflows lists registered workflows with optional filters.
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse) {
    option (google.api.http) = {get: "/v1/capabilities/workflows"};
  }

  // UpdateWorkflow updates a workflow definition. Increments internal revision.
  // Fails if the workflow is currently RUNNING. Immutable fields on ACTIVE workflows
  // (see JobToBeDone documentation) are rejected.
  rpc UpdateWorkflow(UpdateWorkflowRequest) returns (LoomWorkflow) {
    option (google.api.http) = {
      put: "/v1/capabilities/workflows/{workflow.meta.id}"
      body: "*"
    };
  }

  // DeleteWorkflow removes a workflow definition.
  // Fails if the workflow is currently RUNNING or ACTIVE with active sessions.
  rpc DeleteWorkflow(DeleteWorkflowRequest) returns (DeleteWorkflowResponse) {
    option (google.api.http) = {delete: "/v1/capabilities/workflows/{workflow_id}"};
  }

  // ─── Workflow Lifecycle ───────────────────────────────────────────────────────

  // ActivateWorkflow wires a single workflow's agents, skills, and MCP tools and
  // optionally emits the task blueprint. Prefer ActivatePlugin for plugin-delivered
  // workflows; use this RPC directly only for standalone workflows (those registered
  // without a parent plugin) or advanced per-workflow control.
  //
  // Supports idempotent activation via activation_key (same key = same activation).
  // Supports optimistic-locking via expected_generation to prevent double-activation.
  rpc ActivateWorkflow(ActivateWorkflowRequest) returns (ActivateWorkflowResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/workflows/{workflow_id}/activate"
      body: "*"
    };
  }

  // DeactivateWorkflow detaches skills, releases borrowed agents, and optionally
  // closes the task board. Does not wait for in-flight executions; use DrainWorkflow
  // for graceful shutdown.
  rpc DeactivateWorkflow(DeactivateWorkflowRequest) returns (DeactivateWorkflowResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/workflows/{workflow_id}/deactivate"
      body: "*"
    };
  }

  // GetWorkflowStatus returns the current lifecycle state of a workflow.
  rpc GetWorkflowStatus(GetWorkflowStatusRequest) returns (WorkflowLifecycle) {
    option (google.api.http) = {get: "/v1/capabilities/workflows/{workflow_id}/status"};
  }

  // ListWorkflowSessions returns the IDs of sessions currently holding an active
  // activation of a workflow. Complements WorkflowLifecycle.active_session_count.
  rpc ListWorkflowSessions(ListWorkflowSessionsRequest) returns (ListWorkflowSessionsResponse) {
    option (google.api.http) = {get: "/v1/capabilities/workflows/{workflow_id}/sessions"};
  }

  // ValidateWorkflow checks a workflow definition for errors and warnings.
  // Does not change any state. Safe to call before RegisterWorkflow or ActivateWorkflow.
  rpc ValidateWorkflow(ValidateWorkflowRequest) returns (ValidateWorkflowResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/workflows/{workflow_id}/validate"
      body: "*"
    };
  }

  // DrainWorkflow gracefully deactivates a workflow by waiting for in-flight
  // executions to complete before detaching agents and skills. Use when a clean
  // shutdown is required (e.g. before a rolling upgrade or version migration).
  rpc DrainWorkflow(DrainWorkflowRequest) returns (DrainWorkflowResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/workflows/{workflow_id}/drain"
      body: "*"
    };
  }

  // ─── Plugin Management ────────────────────────────────────────────────────────

  // RegisterPlugin registers a LoomPlugin descriptor without installing it.
  // Creates the plugin in AVAILABLE status.
  rpc RegisterPlugin(RegisterPluginRequest) returns (RegisterPluginResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/plugins"
      body: "*"
    };
  }

  // ValidatePlugin checks a plugin descriptor for errors and warnings, including
  // whether all referenced skills and tools can be resolved.
  rpc ValidatePlugin(ValidatePluginRequest) returns (ValidatePluginResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/plugins/{plugin_id}/validate"
      body: "*"
    };
  }

  // InstallPlugin installs a registered plugin: registers skills, configures MCP
  // servers, and creates agents per PluginInstallPolicy.
  // Returns a summary of what was installed, skipped, or failed.
  rpc InstallPlugin(InstallPluginRequest) returns (InstallPluginResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/plugins/{plugin_id}/install"
      body: "*"
    };
  }

  // UninstallPlugin deactivates workflows and optionally removes agents, skills,
  // and MCP server registrations created by this plugin.
  rpc UninstallPlugin(UninstallPluginRequest) returns (UninstallPluginResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/plugins/{plugin_id}/uninstall"
      body: "*"
    };
  }

  // GetPlugin retrieves a plugin descriptor by UUID or name.
  rpc GetPlugin(GetPluginRequest) returns (LoomPlugin) {
    option (google.api.http) = {get: "/v1/capabilities/plugins/{plugin_id}"};
  }

  // ListPlugins lists registered plugins with optional filters.
  rpc ListPlugins(ListPluginsRequest) returns (ListPluginsResponse) {
    option (google.api.http) = {get: "/v1/capabilities/plugins"};
  }

  // ─── Plugin Activation ────────────────────────────────────────────────────────

  // ActivatePlugin is the primary invocation path for any plugin.
  // It wires ALL of the plugin's components for the given session, in order:
  //   1. Workflows with ALWAYS trigger (or all workflows when no trigger is set)
  //   2. Skills — injected as eager SkillBindings
  //   3. MCP tool groups — servers registered for the session
  //   4. Agents — made available for delegation
  //
  // The plugin does not need to contain workflows for this RPC to succeed.
  // Idempotent: same activation_key returns the existing PluginActivation.
  rpc ActivatePlugin(ActivatePluginRequest) returns (ActivatePluginResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/plugins/{plugin_id}/activate"
      body: "*"
    };
  }

  // DeactivatePlugin detaches all components wired by a prior ActivatePlugin call.
  // Set drain=true to wait for any in-flight workflow executions to complete first.
  rpc DeactivatePlugin(DeactivatePluginRequest) returns (DeactivatePluginResponse) {
    option (google.api.http) = {
      post: "/v1/capabilities/plugins/{plugin_id}/deactivate"
      body: "*"
    };
  }

  // GetPluginActivation returns the current activation state for a plugin in a session.
  rpc GetPluginActivation(GetPluginActivationRequest) returns (PluginActivation) {
    option (google.api.http) = {
      get: "/v1/capabilities/plugins/{plugin_id}/activations/{session_id}"
    };
  }

  // ListPluginActivations lists plugin activations, optionally filtered by session,
  // agent, plugin, or status.
  rpc ListPluginActivations(ListPluginActivationsRequest) returns (ListPluginActivationsResponse) {
    option (google.api.http) = {get: "/v1/capabilities/plugins/activations"};
  }
}

// =============================================================================
// Request / Response messages — Workflows
// =============================================================================

// RegisterWorkflowRequest registers a new workflow definition.
message RegisterWorkflowRequest {
  // Workflow definition to register. meta.id is assigned by the server.
  LoomWorkflow workflow = 1;
}

// RegisterWorkflowResponse returns the registered workflow with server-assigned fields.
message RegisterWorkflowResponse {
  // The registered workflow with meta.id and lifecycle fields populated.
  LoomWorkflow workflow = 1;
}

// GetWorkflowRequest retrieves a workflow by ID or name.
message GetWorkflowRequest {
  // Workflow UUID or name (WorkflowMeta.name).
  string workflow_id = 1;
}

// ListWorkflowsRequest lists workflows with optional filters.
message ListWorkflowsRequest {
  // Filter by domain (e.g. "teradata").
  string domain = 1;

  // Filter by lifecycle status.
  WorkflowStatus status = 2;

  // Filter by label key-value pairs. All supplied labels must match (AND semantics).
  map<string, string> labels = 3;

  // Filter by agent ID — return workflows that reference this agent.
  string agent_id = 4;

  // Maximum number of results to return per page.
  int32 page_size = 5;

  // Pagination token from a previous ListWorkflows response.
  string page_token = 6;
}

// ListWorkflowsResponse contains a page of matching workflows.
message ListWorkflowsResponse {
  // Workflows matching the request filters.
  repeated LoomWorkflow workflows = 1;

  // Token to retrieve the next page. Empty if this is the last page.
  string next_page_token = 2;

  // Total number of matching workflows (across all pages).
  int32 total = 3;
}

// UpdateWorkflowRequest updates a workflow definition.
message UpdateWorkflowRequest {
  // Updated workflow. workflow.meta.id must match an existing workflow.
  LoomWorkflow workflow = 1;
}

// DeleteWorkflowRequest removes a workflow definition.
message DeleteWorkflowRequest {
  // Workflow UUID or name.
  string workflow_id = 1;
}

// DeleteWorkflowResponse confirms deletion.
message DeleteWorkflowResponse {
  // True if the workflow was deleted. False if it did not exist.
  bool success = 1;
}

// ActivateWorkflowRequest activates a workflow for a session.
message ActivateWorkflowRequest {
  // Workflow to activate (UUID or name).
  string workflow_id = 1;

  // Session to activate within. When empty, a new session is created.
  // Agents, skills, and tasks are scoped to this session.
  string session_id = 2;

  // Agent ID to use as the primary executor. Overrides WorkflowAgentRef.primary.
  string agent_id = 3;

  // Runtime context variables. Merged with (and override) JobToBeDone.default_context_vars.
  map<string, string> context = 4;

  // When true, emit the task blueprint immediately regardless of emit_on_activation.
  bool force_emit_tasks = 5;

  // When true, log activation steps for debugging without actually wiring components.
  bool dry_run = 6;

  // Idempotency key: a second ActivateWorkflow call with the same key returns the
  // previous response without re-activating. Recommended for at-least-once callers.
  string activation_key = 7;

  // When set, the activation only proceeds if WorkflowMeta.activation_generation
  // matches this value. Used to prevent split-brain double-activations.
  // Set to 0 to skip the generation check.
  int64 expected_generation = 8;

  // When true, wait for the task blueprint emission to complete before returning.
  // When false (default), task emission is asynchronous and task_ids in the
  // response will be empty.
  bool wait_for_tasks = 9;

  // Persona for this activation. Must match one of JobToBeDone.personas if non-empty.
  // Falls back to JobToBeDone.default_persona when empty.
  string persona = 10;
}

// ActivateWorkflowResponse returns the activation state after a successful activation.
message ActivateWorkflowResponse {
  // The updated workflow with lifecycle fields populated.
  LoomWorkflow workflow = 1;

  // Session ID the workflow was activated in (server-assigned if not provided).
  string session_id = 2;

  // IDs of tasks emitted by the task blueprint.
  // Empty when wait_for_tasks=false (async emission) or when no tasks were emitted.
  repeated string task_ids = 3;

  // Names of skills successfully injected during activation.
  repeated string activated_skill_names = 4;

  // MCP servers successfully connected during activation.
  repeated string connected_mcp_servers = 5;

  // Non-fatal warnings raised during activation (e.g. optional components unavailable).
  repeated string warnings = 6;
}

// DeactivateWorkflowRequest deactivates a workflow for a session.
message DeactivateWorkflowRequest {
  // Workflow UUID or name.
  string workflow_id = 1;

  // Session to deactivate. When empty, deactivates all sessions for this workflow.
  string session_id = 2;

  // When true, close all open tasks on the workflow's task board.
  bool close_tasks = 3;

  // Reason for deactivation. Stored in lifecycle.last_error if status ends in error.
  string reason = 4;
}

// DeactivateWorkflowResponse returns the updated workflow after deactivation.
message DeactivateWorkflowResponse {
  // The updated workflow with lifecycle fields reflecting the deactivation.
  LoomWorkflow workflow = 1;
}

// GetWorkflowStatusRequest retrieves the lifecycle state of a workflow.
message GetWorkflowStatusRequest {
  // Workflow UUID or name.
  string workflow_id = 1;
}

// ListWorkflowSessionsRequest lists sessions with an active activation of a workflow.
message ListWorkflowSessionsRequest {
  // Workflow UUID or name.
  string workflow_id = 1;

  // Maximum number of session IDs to return per page.
  int32 page_size = 2;

  // Pagination token from a previous ListWorkflowSessions response.
  string page_token = 3;
}

// ListWorkflowSessionsResponse returns a page of session IDs.
message ListWorkflowSessionsResponse {
  // Session IDs currently holding an active activation of this workflow.
  repeated string session_ids = 1;

  // Total number of active sessions (across all pages).
  int32 total = 2;

  // Token to retrieve the next page. Empty if this is the last page.
  string next_page_token = 3;
}

// ValidateWorkflowRequest requests validation of a workflow definition.
message ValidateWorkflowRequest {
  // Workflow UUID or name to validate.
  string workflow_id = 1;

  // When true, attempt to connect to all referenced MCP servers as part of validation.
  bool check_mcp_connectivity = 2;
}

// ValidateWorkflowResponse returns the validation result.
message ValidateWorkflowResponse {
  // True if no ERROR-severity issues were found.
  bool valid = 1;

  // All validation issues found (errors and warnings).
  repeated ValidationIssue errors = 2;

  // Non-fatal warnings (duplicated from errors for convenience).
  repeated ValidationIssue warnings = 3;
}

// DrainWorkflowRequest requests graceful deactivation of a workflow.
message DrainWorkflowRequest {
  // Workflow UUID or name to drain.
  string workflow_id = 1;

  // Maximum seconds to wait for in-flight executions before force-stopping them.
  // Zero means wait indefinitely (no force-stop).
  int32 drain_timeout_seconds = 2;
}

// DrainWorkflowResponse returns the drain result.
message DrainWorkflowResponse {
  // True if all executions completed cleanly before the drain timeout.
  bool drained_cleanly = 1;

  // Number of executions that completed normally during drain.
  int32 executions_completed = 2;

  // Number of executions that were force-stopped due to the drain timeout.
  int32 executions_force_stopped = 3;
}

// =============================================================================
// Request / Response messages — Plugins
// =============================================================================

// RegisterPluginRequest registers a new plugin descriptor.
message RegisterPluginRequest {
  // Plugin descriptor to register. meta.id is assigned by the server.
  LoomPlugin plugin = 1;
}

// RegisterPluginResponse returns the registered plugin with server-assigned fields.
message RegisterPluginResponse {
  // The registered plugin with meta.id populated.
  LoomPlugin plugin = 1;
}

// ValidatePluginRequest requests validation of a plugin descriptor.
message ValidatePluginRequest {
  // Plugin UUID or name to validate.
  string plugin_id = 1;
}

// ValidatePluginResponse returns the plugin validation result.
message ValidatePluginResponse {
  // True if no ERROR-severity issues were found.
  bool valid = 1;

  // All validation issues found (errors and warnings).
  repeated ValidationIssue errors = 2;

  // Non-fatal warnings (duplicated from errors for convenience).
  repeated ValidationIssue warnings = 3;
}

// InstallPluginRequest installs a registered plugin.
message InstallPluginRequest {
  // Plugin UUID or name to install.
  string plugin_id = 1;

  // When true, overwrite ALL existing components (skills, agents, workflows, MCP servers)
  // regardless of per-component PluginInstallPolicy.overwrite_* flags.
  // When false (default), per-component flags in PluginInstallPolicy control overwrites.
  bool overwrite_existing = 2;

  // Agent ID to use as the target for the default agent creation. Optional.
  string target_agent_id = 3;
}

// InstallPluginResponse returns the installation summary.
message InstallPluginResponse {
  // True if all required components were installed successfully.
  bool success = 1;

  // Number of components successfully installed.
  int32 installed_count = 2;

  // Number of components skipped (already exist, overwrite=false).
  int32 skipped_count = 3;

  // Number of components that failed to install.
  int32 failed_count = 4;

  // Errors for each failed component (non-empty when failed_count > 0).
  repeated string errors = 5;

  // IDs of workflows that were installed.
  repeated string installed_workflow_ids = 6;

  // Names of skills that were installed.
  repeated string installed_skill_names = 7;

  // IDs of agents that were installed.
  repeated string installed_agent_ids = 8;
}

// UninstallPluginRequest uninstalls a plugin and optionally removes its components.
message UninstallPluginRequest {
  // Plugin UUID or name to uninstall.
  string plugin_id = 1;

  // When true, remove skills that were registered by this plugin.
  bool remove_skills = 2;

  // When true, delete agents that were created by this plugin's install policy.
  bool remove_agents = 3;

  // When true, disconnect and remove MCP server registrations added by this plugin.
  bool remove_mcp_servers = 4;
}

// UninstallPluginResponse returns the uninstall summary.
message UninstallPluginResponse {
  // True if the plugin was uninstalled without errors.
  bool success = 1;

  // Number of skills removed.
  int32 removed_skills = 2;

  // Number of agents removed.
  int32 removed_agents = 3;

  // Number of MCP server registrations removed.
  int32 removed_mcp_servers = 4;

  // Errors encountered during uninstall (non-fatal; partial success is possible).
  repeated string errors = 5;
}

// GetPluginRequest retrieves a plugin by ID or name.
message GetPluginRequest {
  // Plugin UUID or name.
  string plugin_id = 1;
}

// ListPluginsRequest lists registered plugins with optional filters.
message ListPluginsRequest {
  // Filter by domain.
  string domain = 1;

  // Filter by plugin status.
  PluginStatus status = 2;

  // Filter by label key-value pairs. All supplied labels must match (AND semantics).
  map<string, string> labels = 3;

  // Maximum number of results to return per page.
  int32 page_size = 4;

  // Pagination token from a previous ListPlugins response.
  string page_token = 5;
}

// ListPluginsResponse contains a page of matching plugins.
message ListPluginsResponse {
  // Plugins matching the request filters.
  repeated LoomPlugin plugins = 1;

  // Token to retrieve the next page. Empty if this is the last page.
  string next_page_token = 2;

  // Total number of matching plugins (across all pages).
  int32 total = 3;
}

// =============================================================================
// Request / Response messages — Plugin Activation
// =============================================================================

// ActivatePluginRequest activates a plugin for a session.
message ActivatePluginRequest {
  // Plugin UUID or name to activate.
  string plugin_id = 1;

  // Session to activate the plugin in.
  string session_id = 2;

  // Agent performing the activation.
  string agent_id = 3;

  // Context variables passed through to any workflow activations triggered by
  // this plugin. Keys override JobToBeDone.default_context_vars.
  map<string, string> context = 4;

  // Idempotency key: a second call with the same key returns the existing
  // PluginActivation without re-wiring components.
  string activation_key = 5;

  // When true, validate and plan the activation without executing it.
  // Returns what would be wired in activation.* fields; no state is changed.
  bool dry_run = 6;

  // Persona passed to any workflow activations. Must match one of the values
  // in JobToBeDone.personas on each activated workflow; ignored for plugins
  // with no workflows.
  string persona = 7;
}

// ActivatePluginResponse returns the plugin activation record.
message ActivatePluginResponse {
  // Activation record with all wired component IDs populated.
  PluginActivation activation = 1;

  // Non-fatal issues: degraded capabilities, optional components not found.
  // Activation still succeeds when only warnings are present.
  repeated ValidationIssue warnings = 2;
}

// DeactivatePluginRequest deactivates a plugin in a session.
message DeactivatePluginRequest {
  // Plugin UUID or name to deactivate.
  string plugin_id = 1;

  // Session from which to deactivate the plugin.
  string session_id = 2;

  // When true, wait for any in-flight workflow executions to complete before
  // detaching components. Equivalent to DrainWorkflow for each active workflow.
  bool drain = 3;
}

// DeactivatePluginResponse returns the deactivation summary.
message DeactivatePluginResponse {
  // True if all components were cleanly detached.
  bool success = 1;

  // Number of workflows that were deactivated.
  int32 deactivated_workflows = 2;

  // Errors encountered during deactivation (non-fatal; partial success possible).
  repeated string errors = 3;
}

// GetPluginActivationRequest retrieves a plugin's activation state in a session.
message GetPluginActivationRequest {
  // Plugin UUID or name.
  string plugin_id = 1;

  // Session ID to look up.
  string session_id = 2;
}

// ListPluginActivationsRequest lists plugin activations with optional filters.
message ListPluginActivationsRequest {
  // Filter by session. Empty = all sessions.
  string session_id = 1;

  // Filter by agent. Empty = all agents.
  string agent_id = 2;

  // Filter by plugin. Empty = all plugins.
  string plugin_id = 3;

  // Filter by activation status. UNSPECIFIED = all statuses.
  PluginActivationStatus status = 4;

  // Maximum number of results per page.
  int32 page_size = 5;

  // Pagination token from a previous ListPluginActivations response.
  string page_token = 6;
}

// ListPluginActivationsResponse contains a page of matching activations.
message ListPluginActivationsResponse {
  // Activations matching the request filters.
  repeated PluginActivation activations = 1;

  // Token to retrieve the next page. Empty if this is the last page.
  string next_page_token = 2;

  // Total number of matching activations (across all pages).
  int32 total = 3;
}
