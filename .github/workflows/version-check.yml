name: Version Consistency Check

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check-version-drift:
    name: Check Version Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'

      - name: Verify version consistency
        run: |
          echo "Checking version consistency across all files..."
          go run ./cmd/version-manager verify

          if [ $? -ne 0 ]; then
            echo ""
            echo "::error::Version drift detected!"
            echo "::error::Run 'just version-sync' locally to fix version inconsistencies."
            exit 1
          fi

          echo "✅ All files have consistent versions!"

      - name: Show current version
        if: always()
        run: |
          VERSION=$(go run ./cmd/version-manager show)
          echo "Current canonical version: $VERSION"
