name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read
  checks: write
  security-events: write  # Required for SARIF upload to code scanning

jobs:
  # ============================================================================
  # Job 1: Proto Linting & Breaking Change Detection
  # ============================================================================
  proto:
    name: Proto Lint & Breaking Changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 0  # Fetch all history for breaking change detection

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Buf Lint
        run: buf lint

      - name: Buf Format Check
        run: buf format --diff --exit-code

      - name: Buf Breaking Change Detection
        if: github.event_name == 'pull_request'
        run: buf breaking --against '.git#branch=origin/main'

      - name: Generate Proto Files
        run: buf generate

      - name: Verify proto generation is up to date
        run: |
          git diff --exit-code gen/ || (
            echo "::error::Generated proto files are out of date. Run 'buf generate' and commit."
            exit 1
          )

  # ============================================================================
  # Job 2: Go Linting
  # ============================================================================
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Proto Files
        run: buf generate

      - name: Generate weaver.yaml from template
        run: go run ./cmd/generate-weaver

      - name: Run gofmt
        run: |
          gofmt_output=$(find . -name '*.go' -not -path './vendor/*' -not -path './gen/*' -exec gofmt -l {} +)
          if [ -n "$gofmt_output" ]; then
            echo "The following files need formatting:"
            echo "$gofmt_output"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.9.0

  # ============================================================================
  # Job 3: Unit Tests with Race Detection
  # ============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Proto Files
        run: buf generate

      - name: Generate weaver.yaml from template
        run: go run ./cmd/generate-weaver

      - name: Pre-warm MCP filesystem server (npm cache)
        # Several MCP integration/conformance tests shell out to
        # `npx -y @modelcontextprotocol/server-filesystem` and start that server
        # under a tight (30-45s) init timeout. A cold npm download can exceed
        # that on a slow-registry day, surfacing as "initialize failed: context
        # deadline exceeded" — a network flake unrelated to the code under test.
        # Fetch the package once here so the timed tests hit the npm cache
        # instead of racing a cold download. `npm install -g` downloads and exits
        # cleanly (no stdio server to hang on, unlike `npx ... --help`); retried
        # for transient registry blips and never hard-fails the job (if the
        # registry is fully down the tests degrade to the prior behaviour).
        run: |
          for i in 1 2 3; do
            npm install -g @modelcontextprotocol/server-filesystem && break
            echo "npm install attempt $i failed; retrying in 5s..."
            sleep 5
          done || true

      - name: Run tests with race detection
        run: |
          # pipefail so a non-zero `go test` exit is not masked by `tee`.
          set -euo pipefail
          go test -tags fts5 -race -v -timeout=10m \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./pkg/... ./internal/... \
            | tee test-output.log

      - name: Run example tests
        run: |
          # pipefail so a non-zero `go test` exit is not masked by `tee`.
          set -euo pipefail
          # ./examples/... covers all example packages; the previous explicit
          # paths (agent-templates, workflows) were stale — the templates moved
          # under examples/reference and `go test` errored "directory not found"
          # (masked by tee until pipefail surfaced it).
          go test -tags fts5 -race -v -timeout=5m \
            ./examples/... \
            | tee -a test-output.log

      - name: Check for race conditions
        run: |
          if grep -q "WARNING: DATA RACE" test-output.log; then
            echo "::error::Race condition detected! Fix before merging."
            exit 1
          fi

      - name: Generate coverage report
        run: |
          # pipefail so a failure in `go tool cover` is not masked by `tee`.
          set -euo pipefail
          go tool cover -func=coverage.out | tee coverage-report.txt
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -1 coverage-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v5
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-loom
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifacts
        if: matrix.go-version == '1.26'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage-report.txt
            test-output.log

  # ============================================================================
  # Job 4: Fuzz Tests (OSSF Scorecard Compliance)
  # Failures fail the job (no swallowed exit codes).
  # ============================================================================
  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Proto Files
        run: buf generate

      - name: Generate weaver.yaml from template
        run: go run ./cmd/generate-weaver

      - name: Run fuzz tests (agent package)
        run: |
          set -euo pipefail
          echo "## Fuzz Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Each fuzz target uses -fuzztime=30s per go test -fuzz invocation (not the Actions job wall limit)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          # Run each fuzz test individually with timeout
          # Use -run=^$ to skip regular tests and only run fuzz tests
          go test -tags fts5 -run=^$ -fuzz='^FuzzTokenCounter$' -fuzztime=30s ./pkg/agent
          go test -tags fts5 -run=^$ -fuzz='^FuzzCompressionProfile$' -fuzztime=30s ./pkg/agent
          go test -tags fts5 -run=^$ -fuzz='^FuzzConfigLoaderYAML$' -fuzztime=30s ./pkg/agent

          echo "✅ Agent package fuzz tests completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Run fuzz tests (prompts package)
        run: |
          set -euo pipefail
          go test -run=^$ -fuzz='^FuzzPromptInterpolation$' -fuzztime=30s ./pkg/prompts
          go test -run=^$ -fuzz='^FuzzEscapeString$' -fuzztime=30s ./pkg/prompts

          echo "✅ Prompts package fuzz tests completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Run fuzz tests (observability package)
        run: |
          set -euo pipefail
          go test -run=^$ -fuzz='^FuzzSpanAttributes$' -fuzztime=30s ./pkg/observability
          go test -run=^$ -fuzz='^FuzzSpanTimestamps$' -fuzztime=30s ./pkg/observability

          echo "✅ Observability package fuzz tests completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Run fuzz tests with hawk (observability privacy)
        run: |
          set -euo pipefail
          go test -tags hawk -run=^$ -fuzz='^FuzzPrivacyRedaction$' -fuzztime=30s ./pkg/observability
          go test -tags hawk -run=^$ -fuzz='^FuzzEmailPattern$' -fuzztime=30s ./pkg/observability

          echo "✅ Privacy fuzz tests completed" >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        run: |
          set -euo pipefail
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Fuzz Testing Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "All fuzz tests executed for OSSF Scorecard compliance; any failure fails this job." >> "$GITHUB_STEP_SUMMARY"
          echo "Each fuzz target uses -fuzztime=30s; this job also has timeout-minutes on the workflow job." >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 5: Build Verification
  # ============================================================================
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26']
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Proto Files
        run: buf generate

      - name: Generate weaver.yaml from template
        run: go run ./cmd/generate-weaver

      - name: Build all packages
        run: go build -tags fts5 -v ./...

      - name: Build looms binary
        shell: bash
        run: |
          mkdir -p bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -tags fts5 -o ./bin/looms.exe ./cmd/looms
          else
            go build -tags fts5 -o ./bin/looms ./cmd/looms
          fi

      - name: Build loom binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -tags fts5 -o ./bin/loom.exe ./cmd/loom
          else
            go build -tags fts5 -o ./bin/loom ./cmd/loom
          fi

      - name: Build loom-standalone binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            go build -tags fts5,standalone -o ./bin/loom-standalone.exe ./cmd/loom-standalone
          else
            go build -tags fts5,standalone -o ./bin/loom-standalone ./cmd/loom-standalone
          fi

      - name: Test looms binary
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bin/looms.exe --version || ./bin/looms.exe --help
          else
            ./bin/looms --version || ./bin/looms --help
          fi

      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.os }}
          path: bin/

  # ============================================================================
  # Job 6: Security Scan
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Set up Go
        uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Setup Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Proto Files
        run: buf generate

      - name: Generate weaver.yaml from template
        run: go run ./cmd/generate-weaver

      - name: Run Gosec Security Scanner
        uses: securego/gosec@9e6a9843d7a4a6e3e9a8539b02612c8a4aa3f889 # v2.27.1
        with:
          args: '-no-fail -fmt sarif -out results.sarif -exclude-dir=gen ./...'

      - name: Fix SARIF schema compliance
        run: |
          # Strip invalid relationships entries that cause SARIF validation failures
          # Handle zero-findings case where rules array may not exist
          jq 'if .runs then .runs |= map(if .tool.driver.rules then .tool.driver.rules |= map(del(.relationships)) else . end) else . end' \
            results.sarif > results-fixed.sarif
          mv results-fixed.sarif results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        continue-on-error: true  # Don't fail the build if code scanning is not enabled
        with:
          sarif_file: results.sarif
          # Stable category so the analysis registers as the "gosec" code-scanning
          # configuration. Without it the category defaults to the workflow path
          # (.github/workflows/ci.yml:security), which the required "Code scanning
          # results / gosec" check can't find -> neutral "configuration not found".
          category: gosec

  # ============================================================================
  # Job 7: Coverage Check
  # ============================================================================
  coverage-check:
    name: Coverage Requirements
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Download coverage report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-report
        continue-on-error: true

      - name: Check coverage thresholds
        run: |
          if [ ! -f coverage-report.txt ]; then
            echo "::warning::Coverage report not found"
            exit 0
          fi

          # Extract total coverage percentage
          COVERAGE=$(grep "total:" coverage-report.txt | awk '{print $3}' | sed 's/%//')

          echo "Total coverage: ${COVERAGE}%"
          echo "## Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY

          # Minimum coverage threshold
          MIN_COVERAGE=30.0

          # Compare coverage
          if (( $(echo "$COVERAGE < $MIN_COVERAGE" | bc -l) )); then
            echo "::warning::Coverage ${COVERAGE}% is below minimum ${MIN_COVERAGE}%"
            echo "⚠️ Coverage below target (${MIN_COVERAGE}%)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Coverage meets minimum requirements" >> $GITHUB_STEP_SUMMARY
          fi

          # Coverage targets
          echo "## Package Coverage Targets" >> $GITHUB_STEP_SUMMARY
          echo "| Package | Target | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| pkg/orchestration | >80% | Check coverage.out |" >> $GITHUB_STEP_SUMMARY
          echo "| pkg/agent | >60% | Check coverage.out |" >> $GITHUB_STEP_SUMMARY
          echo "| pkg/observability | >80% | Check coverage.out |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # Job 8: All Checks Passed
  # ============================================================================
  ci-success:
    name: All CI Checks Passed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - proto
      - lint
      - test
      - fuzz
      - build
      - security
      - coverage-check
    if: always()
    steps:
      - name: Check all jobs
        run: |
          RESULTS='${{ toJson(needs) }}'
          echo "$RESULTS" | jq -r 'to_entries[] | "\(.key): \(.value.result)"'

          # Check if any required job failed
          if echo "$RESULTS" | jq -e 'to_entries[] | select(.key != "coverage-check" and .value.result == "failure")' > /dev/null; then
            echo "::error::One or more CI checks failed"
            exit 1
          fi

          echo "✅ All CI checks passed!" >> $GITHUB_STEP_SUMMARY
