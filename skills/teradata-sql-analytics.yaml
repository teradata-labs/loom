    ### Time Series, DSP & Spatial — Unbounded Array Framework (UAF)
    Multi-series parallelism: A single UAF function call processes all series instances
    simultaneously across all AMPs. Never loop or iterate per entity — pass all series at
    once and let the AMP architecture do the parallelism.

    | Manual / External | Native Function | Topic |
    |-------------------|-----------------|-------|
    | External time series forecasting | TD_ARIMAESTIMATE -> TD_ARIMAVALIDATE -> TD_ARIMAFORECAST | uaf-estimation, uaf-forecasting |
    | Per-entity forecast loops | Single UAF call with all series as SERIES_SPEC | uaf-concepts |
    | External seasonal decomposition | TD_SEASONALNORMALIZE | uaf-estimation |
    | External exponential smoothing | TD_HOLT_WINTERS_FORECASTER, TD_SIMPLEEXP, TD_MAMEAN | uaf-forecasting |
    | External regression on sequences | TD_LINEAR_REGR / TD_MULTIVAR_REGR | uaf-estimation |
    | External autocorrelation / PACF | TD_ACF / TD_PACF | uaf-estimation |
    | External differencing for stationarity | TD_DIFF / TD_UNDIFF | uaf-estimation |
    | External Fourier transform | TD_DFFT / TD_POWERSPEC / TD_LINESPEC | uaf-dsp |
    | External convolution / filtering | TD_CONVOLVE with TD_FILTERFACTORY1D | uaf-dsp, uaf-utility |
    | External wavelet transform | TD_DWT / TD_IDWT | uaf-dsp |
    | External time series anomaly detection | TD_IQR | uaf-data-prep |
    | External DTW similarity | TD_DTW | uaf-forecasting |
    | External geospatial tracking | TD_TRACKINGOP | uaf-utility |
    | Residual diagnostics | TD_DICKEY_FULLER, TD_DURBIN_WATSON, TD_PORTMAN, etc. | uaf-diagnostics |

    ## Pipeline Assembly
    - Apply multiple transforms in one pass: TD_ColumnTransformer with saved FitTables
    - Full scoring pipeline in one query: wrap TD_ColumnTransformer in a CTE, feed into Predict
    - Choosing K for clustering: elbow method UNION ALL pattern (see ml-patterns topic)
    - Class imbalance: split first, then TD_SMOTE on train set only (see ml-patterns topic)
    - UAF multi-step pipelines: chain ARTs — estimate -> validate -> forecast (see uaf-concepts topic)

    ## Query Validation with EXPLAIN
    Always run explain_query before executing non-trivial queries. Red flags to watch for:
    - "estimated with no confidence" -> missing statistics, run COLLECT STATISTICS
    - "product join" -> potential Cartesian explosion, check join conditions
    - "all-rows scan" on large table -> check PI filter or index
    - "redistributed by hash code" on large spool -> consider PI alignment

    ## Workflow Sequences (load topics in order)
    | Use Case | Topic Sequence |
    |----------|---------------|
    | Classification (fraud, churn, risk) | data-exploration -> data-cleaning -> data-prep -> fit-transform-pattern -> ml-functions -> model-evaluation -> ml-patterns |
    | Regression (price, demand, forecast) | data-exploration -> data-cleaning -> data-prep -> ml-functions -> model-evaluation -> ml-patterns |
    | Clustering (segmentation) | data-exploration -> data-prep -> ml-functions -> ml-patterns (elbow) -> model-evaluation (Silhouette) |
    | Operationalize a trained model | fit-transform-pattern -> ml-patterns (CTE prediction pipeline) |
    | Text classification / NLP | data-cleaning -> text-analytics -> model-evaluation |
    | LLM-powered text analytics | authorization-objects -> llm-providers -> ai-text-analytics |
    | PII detection / masking | authorization-objects -> llm-providers -> ai-text-analytics (AI_MaskPII) |
    | Imbalanced classes | data-prep (TD_SMOTE) -> ml-patterns (class imbalance) -> model-evaluation |
    | Micromodeling (per-segment) | ml-functions (TD_GLM) -> ml-patterns (micromodeling) |
    | Semantic search / RAG embeddings | authorization-objects -> llm-providers -> embeddings -> vector-search |
    | In-database ONNX inference | byom-model-loading -> embeddings (ONNXEmbeddings) -> vector-search |
    | Time series forecasting (ARIMA) | uaf-concepts -> uaf-data-prep -> uaf-estimation -> uaf-forecasting -> uaf-diagnostics |
    | Regression on ordered series | uaf-concepts -> uaf-data-prep -> uaf-estimation -> uaf-diagnostics |
    | Frequency / spectral analysis | uaf-concepts -> uaf-dsp (TD_DFFT, TD_POWERSPEC) |
    | Digital signal filtering | uaf-concepts -> uaf-utility (TD_FILTERFACTORY1D) -> uaf-dsp (TD_CONVOLVE) |

    ## When Manual SQL Is Appropriate
    Use hand-written SQL for: basic SELECT/filter/join/aggregation, date/time arithmetic,
    CASE expressions and NULL handling, window functions, schema discovery (DBC.* views),
    and one-off computations not covered by any native function.
  constraints:
    - Always prefer native table operators over hand-written SQL for analytics, ML, and transformations
    - Always EXPLAIN before executing non-trivial queries — act on red flags before running
    - Filter early — push predicates into input subqueries before passing to native functions
    - Never SELECT raw data for analytics — summarize in-database with native functions
    - Persist large outputs with OUT TABLE — never stream model or large result sets to the agent
    - Chain pipeline steps as CTEs to keep intermediate results in-database
    - Use SAMPLE or TOP N when exploring row-level data
  output_format: |
    ## Analysis Plan
    **Objective**: [what the user wants to accomplish]
    **Native functions**: [list of Teradata native functions that apply]
    **Topic references**: [syntax topics to consult for details]

    ### SQL
    ```sql
    -- annotated SQL using native functions
    ```

    ### Explanation
    [Why this approach, what each function does, expected output shape]
  examples:
    - user_input: "I need to find outliers in my sales data"
      expected_output: "Use TD_OutlierFilterFit to learn outlier thresholds, then TD_OutlierFilterTransform to flag or remove them — all in-database"
      explanation: "Native outlier detection runs distributed across AMPs instead of pulling data to client"
    - user_input: "Build a churn prediction model"
      expected_output: "Follow classification workflow: TD_ColumnSummary -> TD_SimpleImputeTransform -> TD_ScaleTransform -> TD_TrainTestSplit -> TD_XGBoost -> TD_ClassificationEvaluator"
      explanation: "End-to-end ML pipeline using native functions with no data leaving Teradata"
